# WARNING: This file is generated by scripts/build_forest_workflows.py. Do NOT edit directly.
name: Code Quality Observability
on:
  pull_request:
    paths:
    - '**/*.py'
    - '**/*.js'
    - AGENTS.md
    - CONTRIBUTING_AGENTS.md
    - .github/pull_request_template.md
    - docs/dev-notes/code-quality-observability.md
    - tools/code_quality_observability.py
    - tests/tools/test_code_quality_observability.py
    - .github/forest_workflows/code-quality-observability.yml
    - .github/forest_workflows/bootstrap.yml
    - .github/workflows/code-quality-observability.yml
  push:
    branches:
    - master
    paths:
    - '**/*.py'
    - '**/*.js'
    - AGENTS.md
    - CONTRIBUTING_AGENTS.md
    - .github/pull_request_template.md
    - docs/dev-notes/code-quality-observability.md
    - tools/code_quality_observability.py
    - tests/tools/test_code_quality_observability.py
    - .github/forest_workflows/code-quality-observability.yml
    - .github/forest_workflows/bootstrap.yml
    - .github/workflows/code-quality-observability.yml
  schedule:
  - cron: 0 11 * * 1
  workflow_dispatch: null
jobs:
  code-quality-observability:
    runs-on:
    - self-hosted
    - Linux
    - X64
    - homelab
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: false
    - name: Ensure docker/.env exists
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${RUNNER_DOCKER_ENV:-}" ] && [ -f "${RUNNER_DOCKER_ENV}" ]; then
          cp "${RUNNER_DOCKER_ENV}" docker/.env
          exit 0
        fi
        if [ ! -f docker/.env ]; then
          printf "%s\n" \
            "UID=1000" \
            "GID=993" \
            "POSTGRES_PASSWORD=localdev" \
            "SECRET_KEY=localdev" \
            "SECURITY_PASSWORD_SALT=localdev" \
            > docker/.env
        fi
    - name: Install wctl shim
      env:
        WCTL_SYMLINK_PATH: ${{ github.workspace }}/.wctl/bin/wctl
      run: |
        set -euo pipefail
        mkdir -p "${GITHUB_WORKSPACE}/.wctl/bin"
        chmod +x wctl/install.sh
        ./wctl/install.sh dev
        echo "${GITHUB_WORKSPACE}/.wctl/bin" >> "$GITHUB_PATH"
    - name: Verify baseline tooling
      run: |
        set -euo pipefail
        command -v python3 >/dev/null || {
          echo "python3 binary not found on the runner." >&2
          exit 127
        }
        python3 --version
        if command -v eslint >/dev/null; then
          eslint --version
        else
          echo "eslint not found; JavaScript complexity will be reported as unknown."
        fi
    - name: Generate observe-only report
      env:
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        set -euo pipefail
        ARGS=(
          --json-out code-quality-report.json
          --md-out code-quality-summary.md
        )
        if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "${PR_BASE_SHA:-}" ]; then
          ARGS+=(--base-ref "${PR_BASE_SHA}")
        fi
        python3 tools/code_quality_observability.py "${ARGS[@]}"
    - name: Publish summary
      if: always()
      run: |
        cat code-quality-summary.md >> "${GITHUB_STEP_SUMMARY}"
    - name: Upload report artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-quality-observability
        path: |
          code-quality-summary.md
          code-quality-report.json
    - name: Post or update PR comment
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- code-quality-observability -->';
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const issue_number = context.issue.number;

          let summary = fs.readFileSync('code-quality-summary.md', 'utf8');
          if (summary.length > 60000) {
            summary = `${summary.slice(0, 60000)}\n\n_(truncated; see artifact for full report)_\n`;
          }
          const body = `${marker}\n## Code Quality Observability\n\n${summary}`;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100
          });
          const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }
    - name: Remove redis data directory
      run: |
        set -euo pipefail
        if [ -d "${GITHUB_WORKSPACE}/.docker-data/redis" ]; then
          echo "Removing ${GITHUB_WORKSPACE}/.docker-data/redis"
          sudo rm -rf "${GITHUB_WORKSPACE}/.docker-data/redis"
        else
          echo "Redis data directory not present; nothing to remove."
        fi
    env:
      RUNNER_DOCKER_ENV: /workdir/wepppy/docker/.env
