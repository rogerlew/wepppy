<div class="wc-theme-switcher" data-theme-switcher>
  <label class="wc-run-header__field" for="wc-theme-switcher-select">
    <span>Themes</span>
    <select id="wc-theme-switcher-select"
            class="wc-theme-switcher__select wc-run-header__input"
            data-theme-select
            aria-label="Interface theme">
      <option value="default">Default (Light) · AA checked</option>
      <option value="light-high-contrast">High Contrast (Light) · AA checked</option>
      <option value="onedark">OneDark · Sensory preference</option>
      <option value="dark-modern">Dark Modern · Sensory preference</option>
      <option value="ayu-dark">Ayu Dark · Sensory preference</option>
      <option value="ayu-mirage">Ayu Mirage · AA checked</option>
      <option value="ayu-light">Ayu Light · Sensory preference</option>
      <option value="ayu-dark-bordered">Ayu Dark · Bordered · Sensory preference</option>
      <option value="ayu-mirage-bordered">Ayu Mirage · Bordered · AA checked</option>
      <option value="ayu-light-bordered">Ayu Light · Bordered · Sensory preference</option>
      <option value="cursor-dark-anysphere">Cursor Dark (Anysphere) · Sensory preference</option>
      <option value="cursor-dark-midnight">Cursor Dark (Midnight) · AA checked</option>
      <option value="cursor-dark-high-contrast">Cursor Dark (High Contrast) · Sensory preference</option>
    </select>
  </label>
</div>
