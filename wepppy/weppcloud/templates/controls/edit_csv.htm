<!DOCTYPE html>
<html>
<script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
<link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
<script src="https://jsuites.net/v4/jsuites.js"></script>
<link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
<body>
<div id="spreadsheet1"></div>
 
<p><button id='save'>Save my changes</button></p>
 
<script>
var mySpreadsheet = jspreadsheet(document.getElementById('spreadsheet1'), {
    csv: '{{ csv_url }}',
    csvHeaders: true,
    columns: [
        { type: 'text', width: 210, 
          source: ['bare', 
                   'forest',
                   'forest high sev fire', 
                   'forest low sev fire', 
                   'forest prescribed fire', 
                   'short grass',
                   'grass high sev fire',
                   'grass low sev fire',
                   'grass prescribed fire',
                   'short grass',
                   'shrub',
                   'shrub high sev fire',
                   'shrub low sev fire',
                   'shrub prescribed fire',
                   'skid',
                   'tall grass',
                   'young forest',
                   'thinning' 
                  ] },
        { type: 'text', width: 110,
          source: ['clay loam', 'loam', 'sand loam', 'silt loam'] },
        { type: 'text', width: 60 },
        { type: 'text', width: 60 },
        { type: 'text', width: 100 },
        { type: 'text', width: 100 },
        { type: 'text', width: 60 },
        { type: 'text', width: 60 },
        { type: 'text', width: 60 },
        { type: 'text', width: 60 }
    ]
});
 
document.getElementById('save').onclick = function () {
    var data = mySpreadsheet.getData();
    fetch("tasks/modify_disturbed", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
        .then((response) => {
            if (!response.ok) {
                throw response;
            }
            return response.json();
        })
        .then(() => {
            alert('Save Successful');
        })
        .catch((error) => {
            if (error && typeof error.json === "function") {
                error.json().then((payload) => {
                    console.log(payload);
                    alert('Save Error, see log');
                }).catch(() => {
                    alert('Save Error, see log');
                });
            } else {
                alert('Save Error, see log');
            }
        });
};

</script>
</body>
</html>
