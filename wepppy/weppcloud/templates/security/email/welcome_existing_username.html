{#
  Context:
    email
    security
    username
#}
<div style="margin:0;padding:24px 12px;background-color:#f5f7fa;font-family:Arial,sans-serif;color:#1f2933;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width:620px;margin:0 auto;background:#ffffff;border:1px solid #d9e2ec;border-radius:8px;">
    <tr>
      <td style="padding:28px 28px 20px 28px;">
        <h1 style="margin:0 0 12px 0;font-size:22px;line-height:1.3;color:#102a43;">Complete Registration with a Different Username</h1>
        <p style="margin:0 0 14px 0;font-size:15px;line-height:1.6;">Hello {{ email }},</p>
        <p style="margin:0 0 14px 0;font-size:15px;line-height:1.6;">The username <strong>{{ username }}</strong> is already associated with another account.</p>
        <p style="margin:0;font-size:15px;line-height:1.6;">Please start registration again and choose a different username.</p>
      </td>
    </tr>
  </table>
</div>
