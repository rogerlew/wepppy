<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Combined Watershed Viewer </title>
    <!-- Style Sheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/leaflet.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/bootstrap.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" type="image/x-icon">
    <link rel="icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" type="image/x-icon">
    <script src="{{ url_for('static', filename='vendor/leaflet/leaflet.js') }}"></script>
<script type="text/javascript">
const site_prefix = "{{ site_prefix }}";

function getURLParameter(name) {
    const params = new URLSearchParams(window.location.search);
    const value = params.get(name);
    return value === null ? undefined : value;
}

function decodeJsonParam(value) {
    if (value === undefined) {
        return undefined;
    }
    if (value === null) {
        return null;
    }
    const raw = String(value);
    try {
        return JSON.parse(raw);
    } catch (err) {
        return raw;
    }
}

async function fetchJson(url) {
    const response = await fetch(url, { credentials: 'same-origin' });
    const text = await response.text();
    if (!response.ok) {
        throw new Error(`Request failed (${response.status})`);
    }
    if (!text) {
        return null;
    }
    try {
        return JSON.parse(text);
    } catch (err) {
        throw new Error('Invalid JSON response');
    }
}

async function fetchText(url) {
    const response = await fetch(url, { credentials: 'same-origin' });
    if (!response.ok) {
        throw new Error(`Request failed (${response.status})`);
    }
    return response.text();
}

function render_legend_cmap(cmap, canvasID) {
    const canvas = document.getElementById(canvasID);
    if (!canvas) {
        return;
    }

    const rect = canvas.getBoundingClientRect();
    const width = Math.max(1, Math.round(rect.width));
    const height = Math.max(1, Math.round(rect.height));
    canvas.width = width;
    canvas.height = height;
    const data = new Float32Array(height * width);

    for (let y = 0; y <= height; y++) {
        for (let x = 0; x <= width; x++) {
            data[(y * width) + x] = x / (width - 1.0);
        }
    }

    const plot = new plotty.plot({
        canvas: canvas,
        data: data, width: width, height: height,
        domain: [0, 1], colorScale: cmap
    });
    plot.render();
}

document.addEventListener('DOMContentLoaded', async () => {
    let center;
    let zoom;
    let display_units;
    let ws;
    let varopts;
    let varname;
    let title;

    const map = L.map('map');

    const googleTerrain = L.tileLayer("https://{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}", {
      maxZoom: 20,
      subdomains: ["mt0", "mt1", "mt2", "mt3"]
    });

    const googleSat = L.tileLayer("https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}", {
      maxZoom: 20,
      subdomains: ["mt0", "mt1", "mt2", "mt3"]
    });

    const baseMaps = {
      "Satellite": googleSat,
      "Terrain": googleTerrain
    };

    const overlayMaps = {};

    googleSat.addTo(map);
    googleTerrain.addTo(map);

    const ctrls = L.control.layers(baseMaps, overlayMaps);
    ctrls.addTo(map);

    let tolerance;
    let units = '';
    let numvars;
    let defaultStyle;

    const cmapperRunoff = createColormap({ colormap: 'winter', nshades: 64 });
    const cmapperLoss = createColormap({ colormap: "jet2", nshades: 64 });
    const cmapperPhosphorus = createColormap({ colormap: 'viridis', nshades: 64 });

    let cmap;
    let r;
    let vmin = 0.0;
    let vmax;
    let cmapname;

    let Legend;
    let legend;

    let VarSelection;
    let varSelection;

    let TitleBox;

    let polys;
    let data;
    let popup;

    const dataUri = getURLParameter("data_uri");

    if (dataUri !== undefined) {
        try {
            const payload = await fetchJson(dataUri);
            if (payload) {
                center = payload.center;
                zoom = payload.zoom;
                display_units = payload.units;
                ws = payload.ws;
                varopts = payload.varopts;
                varname = payload.varname;
                title = payload.title;
            }
            await callback();
        } catch (error) {
            console.error(error);
        }

    } else {
        const centerParam = getURLParameter("center");
        if (centerParam === undefined) {
            center = [39.0, -99.0];
        } else {
            center = decodeJsonParam(centerParam);
        }

        const zoomParam = getURLParameter("zoom");
        if (zoomParam === undefined) {
            zoom = 5;
        } else {
            zoom = decodeJsonParam(zoomParam);
        }

        display_units = getURLParameter("units");
        if (display_units === undefined) {
            display_units = 'SI';
        }

        ws = getURLParameter("ws");
        if (ws !== undefined) {
            ws = decodeJsonParam(ws);
        }

        varopts = getURLParameter("varopts");
        if (varopts !== undefined) {
            varopts = decodeJsonParam(varopts);

            if (display_units !== 'SI') {
                if ("runoff" in varopts) {
                    varopts["runoff"] *= 25.4;
                }
                if ("subrunoff" in varopts) {
                    varopts["subrunoff"] *= 25.4;
                }
                if ("baseflow" in varopts) {
                    varopts["baseflow"] *= 25.4;
                }
                if ("phosphorus" in varopts) {
                    varopts["phosphorus"] *= 1.12085;
                }
                if ("loss" in varopts) {
                    varopts["loss"] *= 1.12085;
                }
            }
        }

        varname = getURLParameter("varname");
        if (varname === undefined && varopts) {
            varname = Object.keys(varopts)[0];
        }

        title = getURLParameter("title");
        if (title !== undefined && title !== null) {
            title = String(title);
        }

        await callback();

    }

    function prep_render() {

        if (varname === 'runoff' || varname === 'subrunoff' || varname === 'baseflow') {
            r = tolerance;
            cmap = function (v) {
                return cmapperRunoff.map(v / r);
            };
            vmin = 0.0;
            vmax = tolerance;
            cmapname = 'winter';
            units = 'mm';
        } else if (varname === 'loss') {
            r = tolerance;
            cmap = function (v) {
                return cmapperLoss.map(v / r);
            };
            vmin = 0.0;
            vmax = tolerance;
            cmapname = 'jet2';
            units = 'kg/ha';
        } else if (varname === 'phosphorus') {
            r = tolerance;
            if (r < 1) {
                r = Math.pow(r, 2.0);
            }
            cmap = function (v) {
                return cmapperPhosphorus.map(v / r);
            };
            vmin = 0.0;
            vmax = tolerance;
            cmapname = 'viridis';
            units = 'kg/ha';
        }
    }

    function set_tolerance() {
        let scale;
        if (display_units === 'SI') {
            scale = 1;
        } else {
            if (units === 'mm') {
                scale = 25.4;
            } else if (units === 'kg/ha') {
                scale = 1.12085;
            }
        }

        const input = document.getElementById('tolerance-input');
        if (!input) {
            return;
        }
        const value = parseFloat(input.value);
        if (Number.isNaN(value)) {
            return;
        }
        tolerance = value * scale;
        prep_render();
        render_legend();
        render();
    }

    function render_legend() {
        if (legend !== undefined) {
            legend.remove();
        }
        legend = new Legend();
        map.addControl(legend);
        render_legend_cmap(cmapname, 'legend_canvas');
        const button = document.getElementById('set-tolerance-btn');
        if (button) {
            button.addEventListener('click', set_tolerance);
        }

    }

    async function render() {
        if (!Array.isArray(ws) || ws.length === 0) {
            return;
        }
        if (data === undefined) {
            map.spin(true);
            data = {};
            const tasks = ws.map(async (w) => {
                const runid = w.runid;

                try {
                    const response = await fetchJson(site_prefix + "/runs/" + runid + "/cfg/query/wepp/" + varname + "/subcatchments/");
                    if (response === null) {
                        throw new Error('query returned null');
                    }
                    data[runid] = response;
                    _render(runid, response);
                } catch (error) {
                    data[runid] = null;
                    console.log(error);
                }
            });
            await Promise.allSettled(tasks);
            map.spin(false);
        } else {
            for (const w of ws) {
                const runid = w.runid;
                _render(runid, data[runid]);
            }
        }
    }

    function _render(runid, _data) {
        if (!_data || !polys || !polys[runid]) {
            return;
        }
        polys[runid].eachLayer(function (layer) {
            const topId = layer.feature.properties.TopazID;
            const v = parseFloat(_data[topId].value);
            const c = cmap(v);

            layer.setStyle({
                color: c,
                weight: 1,
                opacity: 0.9,
                fillColor: c,
                fillOpacity: 0.9
            });
        });
    }

    function applyPopupUnits() {
        if (display_units !== 'SI') {
            document.querySelectorAll('.units-m').forEach((el) => el.classList.remove('invisible'));
            document.querySelectorAll('.units-ft').forEach((el) => el.classList.add('invisible'));

            document.querySelectorAll('.units-ha').forEach((el) => el.classList.remove('invisible'));
            document.querySelectorAll('.units-acre').forEach((el) => el.classList.add('invisible'));
        }
    }

    function attachVarRadioHandlers() {
        document.querySelectorAll('input[type="radio"][name="varRadio"]').forEach((input) => {
            input.addEventListener('change', () => {
                varname = input.value;
                tolerance = varopts[varname];
                data = undefined;

                prep_render();
                render_legend();
                render();
            });
        });
    }

    async function callback() {
        if (!center || zoom === undefined || !varopts) {
            return;
        }
        map.setView(center, zoom);
        tolerance = varopts[varname];
        units = '';
        numvars = Object.keys(varopts).length;

        defaultStyle = {
            "color": "#ff7800",
            "weight": 2,
            "opacity": 0.65,
            "fillColor": "#ff7800",
            "fillOpacity": 0.3
        };


        Legend = L.Control.extend({
            options: {
                position: 'bottomleft'
            },
            initialize: function (options) {
                // constructor
            },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');

                container.style.backgroundColor = 'white';
                container.style.width = '240px';
                container.style.height = '150px';

                if (display_units === 'SI') {
                    container.innerHTML =
                        '<div style="padding-left: 10px; padding-right: 10px; padding-top: 5px;">' +
                        '<h6>' + varname.charAt(0).toUpperCase() + varname.slice(1) + ' Legend</h6>' +
                        '<div>' + units + '</div>' +
                        '<canvas id="legend_canvas" width=180 height=20 ' +
                        'style="width:200px;height:20px;display:table;margin:0 auto;"></canvas>' +
                        '<div class="row">' +
                        '<div class="col-md-4"><span id="legend_vmin">' + vmin + '</span></div>' +
                        '<div class="col-md-4" style="text-align: center;">0</div>' +
                        '<div class="col-md-4" style="text-align: right;"><span id="legend_vmax">' + vmax + '</span></div>' +
                        '</div>' +
                        '<div class="row" style="padding-top: 18px;">' +
                        '<div class="col-md-4"><input class="form-control-sm" style="width:80px;" id="tolerance-input" type="text" value="' + tolerance + '"></div>' +
                        '<div class="col-md-8"><button id="set-tolerance-btn" class="btn btn-primary btn-sm">Set Tolerance</button></div>' +
                        '</div>' +
                        '</div>';
                } else {
                    let scale;
                    let _units;
                    if (units === 'mm') {
                        scale = 0.0393701;
                        _units = 'in';
                    } else if (units === 'kg/ha') {
                        scale = 0.892179;
                        _units = 'lb/ha';
                    }

                    const _vmin = parseFloat(vmin * scale).toFixed(2);
                    const _vmax = parseFloat(vmax * scale).toFixed(2);
                    const _tolerance = parseFloat(tolerance * scale).toFixed(2);

                    container.innerHTML =
                        '<div style="padding-left: 10px; padding-right: 10px; padding-top: 5px;">' +
                        '<h6>' + varname.charAt(0).toUpperCase() + varname.slice(1) + ' Legend</h6>' +
                        '<div>' + _units + '</div>' +
                        '<canvas id="legend_canvas" width=180 height=20 ' +
                        'style="width:200px;height:20px;display:table;margin:0 auto;"></canvas>' +
                        '<div class="row">' +
                        '<div class="col-md-4"><span id="legend_vmin">' + _vmin + '</span></div>' +
                        '<div class="col-md-4" style="text-align: center;">0</div>' +
                        '<div class="col-md-4" style="text-align: right;"><span id="legend_vmax">' + _vmax + '</span></div>' +
                        '</div>' +
                        '<div class="row" style="padding-top: 18px;">' +
                        '<div class="col-md-4"><input class="form-control-sm" style="width:80px;" id="tolerance-input" type="text" value="' + _tolerance + '"></div>' +
                        '<div class="col-md-8"><button id="set-tolerance-btn" class="btn btn-primary btn-sm">Set Tolerance</button></div>' +
                        '</div>' +
                        '</div>';
                }

                return container;
            },
            onRemove: function (map) {
                // when removed
            }
        });

        VarSelection = L.Control.extend({
            options: {
                position: 'bottomleft'
            },
            initialize: function (options) {
                // constructor
            },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');

                container.style.backgroundColor = 'white';
                container.style.width = '240px';
                container.style.height = (30 + 28 * numvars) + 'px';

                let html = '<div style="padding-left: 10px; padding-top: 5px;">';
                html += '<h6>Select Variable</h6>';

                for (let key in varopts) {

                    html += '<div class="radio"><label><input type="radio" id="varRadio" name="varRadio" value="' + key + '"';

                    if (key === varname) {
                        html += 'checked';
                    }

                    if (key === 'runoff') {
                        html += '> Runoff</label></div>';
                    } else if (key === 'subrunoff') {
                        html += '> Lateral Flow</label></div>';
                    } else if (key === 'baseflow') {
                        html += '> Baseflow</label></div>';
                    } else if (key === 'phosphorus') {
                        html += '> Total Phosphorus</label></div>';
                    } else if (key === 'loss') {
                        html += '> Soil Deposition/Loss</label></div>';
                    } else {
                        html += '> ' + key + '</label></div>';
                    }
                }
                html += '</div>';
                container.innerHTML = html;
                return container;
            },
            onRemove: function (map) {
                // when removed
            }
        });

        varSelection = new VarSelection();
        map.addControl(varSelection);

        TitleBox = L.Control.extend({
            options: {
                position: 'bottomright'
            },
            initialize: function (options) {
                // constructor
            },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');

                container.style.backgroundColor = 'transparent';
                container.style.borderColor = 'transparent';
                container.style.width = '500px';
                container.style.height = '40px';

                container.innerHTML = '<h4 style="text-shadow: -1px -1px 0 #FFF, 1px -1px 0 #FFF, -1px 1px 0 #FFF, 1px 1px 0 #FFF;">' + title + '</h4>';
                return container;
            },
            onRemove: function (map) {
                // when removed
            }
        });
        // titleBox = TitleBox();
        // map.addControl(titleBox);

        attachVarRadioHandlers();

        polys = {};
        data = undefined;
        popup = undefined;


        if (Array.isArray(ws)) {
            for (const w of ws) {
                const runid = w.runid;
                const cfg = w.cfg;
                polys[runid] = {};

                try {
                    const response = await fetchJson(site_prefix + "/runs/" + runid + "/cfg/resources/subcatchments.json");
                    if (!response || !response.features) {
                        throw new Error('Missing subcatchments');
                    }
                    polys[runid] = L.geoJSON(response.features, {
                        style: defaultStyle,
                        onEachFeature: function (feature, layer) {
                            layer.on({
                                click: async function click(ev) {
                                    const topaz_id = ev.target.feature.properties.TopazID;
                                    const query_url = site_prefix + "/runs/" + runid + "/cfg/report/sub_summary/" + topaz_id + "/";
                                    try {
                                        const response = await fetchText(query_url);
                                        if (popup !== undefined) {
                                            popup.remove();
                                        }
                                        const content =
                                            '<h5>' + runid + '</h5>' +
                                            response +
                                            '<a href="' + site_prefix + '/runs/' + runid + '/' + cfg + '/" target="_blank">View Watershed Run</a>';

                                        popup = L.popup()
                                            .setLatLng(ev.latlng)
                                            .setContent(content)
                                            .openOn(map);

                                        applyPopupUnits();
                                    } catch (error) {
                                        console.log(error);
                                    }
                                }
                            });
                        }
                    });

                    polys[runid].name = response.name;
                    polys[runid].addTo(map);
                    ctrls.addOverlay(polys[runid], runid);
                } catch (error) {
                    console.log(error);
                }
            }

            prep_render();
            render_legend();
            render();
        }
    }
});
</script>
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        html, body, #map {
            height: 100%;
            width: 100%;
        }
    </style>
  </head>
  <body>
       <div id="map"></div>
    <!-- Placed at the end of the document so the pages load faster -->
    <script type="text/javascript" src="{{ url_for('static', filename='js/spin.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/tinyqueue.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/polylabel.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/underscore.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/colormap.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/geotiff.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/plotty.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/leaflet-spin.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/leaflet-geotiff.js') }}"></script>
  </body>
</html>
