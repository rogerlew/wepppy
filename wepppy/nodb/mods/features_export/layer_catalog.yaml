metadata:
  catalog_version: "0.4.0-draft"
  schema_version: 2
  updated_at_utc: "2026-07-16T19:30:00Z"
  owner: "wepppy/nodb/mods/features_export"
  status: "draft"
  resolver_contract:
    allowed_locator_kinds:
      - "nodb_ref"
      - "relpath"
      - "path_template"
    path_template_vars:
      scope_root:
        description: "Output scope path root for WEPP scope-aware datasets."
        values:
          baseline: "output"
          roads: "roads/output"
      scenario_id:
        description: "Resolved Omni scenario identifier from request selector."
      contrast_id:
        description: "Resolved Omni contrast identifier from request selector."
      swat_run_id:
        description: "Resolved SWAT run id (never `latest` after normalization)."
      table_name:
        description: "Resolved SWAT interchange table name."
      crs_token:
        description: "Filename token for CRS-specific geometry assets."
        values:
          wgs: "WGS"
          utm: "UTM"
    join_key_precedence:
      order:
        - "primary_key"
        - "fallback_keys"
      source_key_map_overrides: true
    include_geometry_locator_in_dependency_fingerprint: true
    temporal_modes:
      - "annual_average"
      - "yearly"
      - "event"
    event_selectors:
      - "date"
      - "return_period"
  notes:
    - "Authoritative machine-readable catalog for features export discoverability."
    - "Layer definitions include resolved datapaths, join contracts, dependency inputs, and temporal rule metadata."
    - "Optional measures define explicit availability gates for version/column drift (for example `tsmf`, phosphorus)."

layers:
  - layer_id: "watershed.subcatchments"
    label: "hillslopes.parquet"
    family: "watershed"
    scope_class: "scope_invariant"
    geometry:
      type: "polygon"
      locator:
        kind: "nodb_ref"
        value: "nodb:watershed.subwta_shp"
      feature_id_keys:
        - "topaz_id"
        - "TopazID"
        - "wepp_id"
    join:
      primary_key: "topaz_id"
      fallback_keys:
        - "TopazID"
        - "wepp_id"
      source_key_map:
        watershed_subcatchments_geojson:
          - "TopazID"
          - "topaz_id"
        watershed_hillslope_attributes:
          - "topaz_id"
          - "TopazID"
          - "wepp_id"
    sources:
      - source_id: "watershed_subcatchments_geojson"
        kind: "vector"
        locator:
          kind: "nodb_ref"
          value: "nodb:watershed.subwta_shp"
        required: true
        role: "geometry_and_attributes"
      - source_id: "watershed_hillslope_attributes"
        kind: "parquet"
        locator:
          kind: "relpath"
          value: "watershed/hillslopes.parquet"
        required: false
        role: "attributes"
    dependencies:
      - dep_id: "watershed_controller_state"
        kind: "nodb"
        locator:
          kind: "relpath"
          value: "watershed.nodb"
        required: true
        purpose: "Topology/state fingerprint dependency."
    temporal:
      supported_modes: []
      grain: "none"
      time_columns: []
      mode_rules: {}
    measures:
      required:
        - "topaz_id"
        - "area_m2"
      optional: []

