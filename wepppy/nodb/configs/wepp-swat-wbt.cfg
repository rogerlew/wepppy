[general]
name = "wepp-swat-wbt"
cellsize=30
locales=["us",]

[unitizer]
is_english=true

[watershed]
delineation_backend = "wbt"

[watershed.wbt]
mcl=100
csa=10
fill_or_breach = "breach_least_cost"
blc_dist=1000

[landuse]
enable_landuse_change=true
mapping  = "disturbed"

[soils]
wepp_chn_type  = "default"

[map]
center0 = [40.0, -99.0]
zoom0 = 3

[nodb]
mods = ["disturbed", "swat"]

[disturbed]
sol_ver = 9002

[climate]
observed_clis_wc = None
future_clis_wc = None

[wepp]
wepp_ui = true
snow=true
bin=wepp_dcc52a6
run_wepp_watershed = false

[swat]
enabled = true
swatplus_version_major = 1
swatplus_version_minor = 4
swat_bin = wepppy/nodb/mods/swat/bin/swatplus-61.0.2.61-17-g834fad2-gnu-lin_x86_64
swat_template_dir = wepppy/nodb/mods/swat/templates/ref_1hru
recall_filename_template = hill_{wepp_id:05d}.rec
recall_subdir = recall
include_subsurface = true
include_tile = true
cli_calendar_path = None
recall_wst = auto
recall_object_type = sdc
time_start_year = 1
width_method = bieger2015
channel_mann = 0.05
channel_fpn = None
channel_erod_fact = 0.01
channel_cov_fact = 0.01
channel_d50_mm = 12.0

[snow_opts]
rst=0
newsnw=100.0
ssd=250.0

[phosphorus_opts]
surf_runoff = None
lateral_flow = None
baseflow = None
sediment = None

[wmesque]
version=2

[interchange]
delete_after_interchange=true
