[general]
name = "tenerife-5m-disturbed"
cellsize=5
dem_db = "tenerife/MDT05_Tenerife"
locales=["tenerife", "eu"]

[unitizer]
is_english=false

[watershed]
delineation_backend = "wbt"

[watershed.wbt]
mcl=40
csa=4
fill_or_breach = "breach_least_cost"
blc_dist=1000

[landuse]
enable_landuse_change=true
mapping  = "eu-disturbed"
nlcd_db  = "eu/corine_landcover/2018"

[soils]
wepp_chn_type  = "default"
soils_map = "LOCALES_DIR/tenerife/soils/tf_soil_5.tif"
ssurgo_db = "None"

[map]
center0 = [28.3007, -16.533]
zoom0 = 10

[nodb]
mods = ["disturbed", "debris_flow", "ash"]

[climate]
cligen_db = "tenerife_stations.db"
observed_clis_wc=None
future_clis_wc=None
daymet_observed=None

[wepp]
wepp_ui = true
bin = "wepp_31131a7"

[phosphorus_opts]
surf_runoff = None
lateral_flow = None
baseflow = None
sediment = None

[wmesque]
version=2
