<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClimateNA API Test</title>
    <style>
        #clmOut {
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>ClimateNA API Test</h1>
    <div>Results will appear below:</div>
    <div id="clmOut"></div>

    <script>
        // ClimateNA example code
        var latlon = [
            {lat: 48.98, lon: -115.02, el: 1000, prd: "Normal_1961_1990.nrm", varYSM: "Y"},
            {lat: 50.25, lon: -120, el: 100, prd: "Normal_1961_1990.nrm", varYSM: "Y"}
        ];

        function buildParams(prefix, obj, add) {
            if (Array.isArray(obj)) {
                obj.forEach(function (value, index) {
                    if (/\[\]$/.test(prefix)) {
                        add(prefix, value);
                    } else {
                        buildParams(
                            prefix + "[" + (typeof value === "object" && value != null ? index : "") + "]",
                            value,
                            add
                        );
                    }
                });
            } else if (obj !== null && typeof obj === "object") {
                Object.keys(obj).forEach(function (name) {
                    buildParams(prefix + "[" + name + "]", obj[name], add);
                });
            } else {
                add(prefix, obj);
            }
        }

        function toQuery(params) {
            var parts = [];
            var add = function (key, value) {
                var resolved = value == null ? "" : value;
                parts.push(encodeURIComponent(key) + "=" + encodeURIComponent(resolved));
            };
            Object.keys(params).forEach(function (prefix) {
                buildParams(prefix, params[prefix], add);
            });
            return parts.join("&");
        }

        fetch('https://api6.climatebc.ca/api/clmApi6/', {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"
            },
            body: toQuery({ "": latlon })
        })
            .then(function (response) {
                if (!response.ok) {
                    throw response;
                }
                return response.json();
            })
            .then(function (result) {
                document.getElementById("clmOut").textContent = JSON.stringify(result, null, 2);
            })
            .catch(function (error) {
                if (error && typeof error.text === "function") {
                    error.text().then(function (message) {
                        alert(message);
                        alert("fail");
                    }).catch(function () {
                        alert("fail");
                    });
                } else {
                    alert("fail");
                }
            });
    </script>
</body>
</html>
