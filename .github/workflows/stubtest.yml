# WARNING: This file is generated by scripts/build_forest_workflows.py. Do NOT edit directly.
name: Stubtest
on:
  pull_request:
    paths:
    - wepppy/**/*.py
    - wepppy/**/*.pyi
    - stubs/**/*.pyi
    - tools/sync_stubs.py
    - .github/workflows/stubtest.yml
  push:
    branches:
    - master
    paths:
    - wepppy/**/*.py
    - wepppy/**/*.pyi
    - stubs/**/*.pyi
    - tools/sync_stubs.py
    - .github/workflows/stubtest.yml
  workflow_dispatch: null
jobs:
  stubtest:
    runs-on:
    - self-hosted
    - Linux
    - X64
    - homelab
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: false
    - name: Ensure docker/.env exists
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${RUNNER_DOCKER_ENV:-}" ] && [ -f "${RUNNER_DOCKER_ENV}" ]; then
          cp "${RUNNER_DOCKER_ENV}" docker/.env
          exit 0
        fi
        if [ ! -f docker/.env ]; then
          printf "%s\n" \
            "UID=1000" \
            "GID=993" \
            "POSTGRES_PASSWORD=localdev" \
            "SECRET_KEY=localdev" \
            "SECURITY_PASSWORD_SALT=localdev" \
            > docker/.env
        fi
    - name: Install wctl shim
      env:
        WCTL_SYMLINK_PATH: ${{ github.workspace }}/.wctl/bin/wctl
      run: |
        set -euo pipefail
        mkdir -p "${GITHUB_WORKSPACE}/.wctl/bin"
        chmod +x wctl/install.sh
        ./wctl/install.sh dev
        echo "${GITHUB_WORKSPACE}/.wctl/bin" >> "$GITHUB_PATH"
    - name: Ensure docker secrets exist
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p docker/secrets
        chmod 700 docker/secrets

        seed_secret() {
          local name="$1"
          local fallback="$2"
          local target="docker/secrets/${name}"
          if [ -f "${target}" ]; then
            return 0
          fi
          local host_source=""
          if [ -n "${RUNNER_DOCKER_ENV:-}" ]; then
            host_source="$(dirname "${RUNNER_DOCKER_ENV}")/secrets/${name}"
          fi
          if [ -n "${host_source}" ] && [ -f "${host_source}" ]; then
            cp "${host_source}" "${target}"
          else
            printf "%s\n" "${fallback}" > "${target}"
          fi
          chmod 600 "${target}"
        }

        # Keep Compose secret mounts satisfiable even on fresh runner workspaces.
        seed_secret redis_password localdev
        seed_secret postgres_password localdev
        seed_secret flask_secret_key localdev
        seed_secret flask_security_password_salt localdev
        seed_secret wepp_auth_jwt_secrets localdev
        seed_secret agent_jwt_secret localdev
        seed_secret cap_secret localdev
        seed_secret oauth_github_client_secret localdev
        seed_secret oauth_google_client_secret localdev
        seed_secret zoho_noreply_email_password localdev
        seed_secret opentopography_api_key localdev
        seed_secret climate_engine_api_key localdev
    - name: Ensure weppcloud service is running
      run: |
        set -euo pipefail
        wctl up -d weppcloud
    - name: Run stubtest suite
      run: |
        set -euo pipefail
        wctl run-stubtest
    - name: Check pytest stubs completeness
      run: |
        set -euo pipefail
        wctl check-test-stubs
    - name: Check pytest isolation
      run: |
        set -euo pipefail
        wctl check-test-isolation
    - name: Remove redis data directory
      run: |
        set -euo pipefail
        REDIS_DIR="${GITHUB_WORKSPACE}/.docker-data/redis"
        if [ ! -d "${REDIS_DIR}" ]; then
          echo "Redis data directory not present; nothing to remove."
          exit 0
        fi

        echo "Removing ${REDIS_DIR}"
        if rm -rf "${REDIS_DIR}" 2>/dev/null; then
          echo "Removed redis data directory without sudo."
          exit 0
        fi

        if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
          sudo -n rm -rf "${REDIS_DIR}"
          echo "Removed redis data directory with passwordless sudo."
          exit 0
        fi

        echo "Warning: unable to remove ${REDIS_DIR} without interactive sudo; continuing." >&2
    env:
      RUNNER_DOCKER_ENV: /workdir/wepppy/docker/.env
