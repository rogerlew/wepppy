# WARNING: This file is generated by scripts/build_forest_workflows.py. Do NOT edit directly.
name: RQ-Engine Contract Guards
on:
  pull_request:
    paths:
    - wepppy/microservices/rq_engine/**
    - tests/microservices/test_rq_engine_openapi_contract.py
    - tests/tools/test_endpoint_inventory_guard.py
    - tests/tools/test_route_contract_checklist_guard.py
    - tools/check_endpoint_inventory.py
    - tools/check_route_contract_checklist.py
    - tools/wctl2/commands/python_tasks.py
    - tools/wctl2/tests/test_python_tasks_commands.py
    - docs/work-packages/20260208_rq_engine_agent_usability/artifacts/endpoint_inventory_freeze_20260208.md
    - docs/work-packages/20260208_rq_engine_agent_usability/artifacts/route_contract_checklist_20260208.md
    - .github/forest_workflows/rq-engine-contract-guards.yml
    - .github/workflows/rq-engine-contract-guards.yml
  push:
    branches:
    - master
    paths:
    - wepppy/microservices/rq_engine/**
    - tests/microservices/test_rq_engine_openapi_contract.py
    - tests/tools/test_endpoint_inventory_guard.py
    - tests/tools/test_route_contract_checklist_guard.py
    - tools/check_endpoint_inventory.py
    - tools/check_route_contract_checklist.py
    - tools/wctl2/commands/python_tasks.py
    - tools/wctl2/tests/test_python_tasks_commands.py
    - docs/work-packages/20260208_rq_engine_agent_usability/artifacts/endpoint_inventory_freeze_20260208.md
    - docs/work-packages/20260208_rq_engine_agent_usability/artifacts/route_contract_checklist_20260208.md
    - .github/forest_workflows/rq-engine-contract-guards.yml
    - .github/workflows/rq-engine-contract-guards.yml
  workflow_dispatch: null
jobs:
  rq-engine-contract-guards:
    runs-on:
    - self-hosted
    - Linux
    - X64
    - homelab
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: false
    - name: Ensure docker/.env exists
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${RUNNER_DOCKER_ENV:-}" ] && [ -f "${RUNNER_DOCKER_ENV}" ]; then
          cp "${RUNNER_DOCKER_ENV}" docker/.env
          exit 0
        fi
        if [ ! -f docker/.env ]; then
          printf "%s\n" \
            "UID=1000" \
            "GID=993" \
            "POSTGRES_PASSWORD=localdev" \
            "SECRET_KEY=localdev" \
            "SECURITY_PASSWORD_SALT=localdev" \
            > docker/.env
        fi
    - name: Install wctl shim
      env:
        WCTL_SYMLINK_PATH: ${{ github.workspace }}/.wctl/bin/wctl
      run: |
        set -euo pipefail
        mkdir -p "${GITHUB_WORKSPACE}/.wctl/bin"
        chmod +x wctl/install.sh
        ./wctl/install.sh dev
        echo "${GITHUB_WORKSPACE}/.wctl/bin" >> "$GITHUB_PATH"
    - name: Ensure docker secrets exist
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p docker/secrets
        chmod 700 docker/secrets

        seed_secret() {
          local name="$1"
          local fallback="$2"
          local target="docker/secrets/${name}"
          if [ -f "${target}" ]; then
            return 0
          fi
          local host_source=""
          if [ -n "${RUNNER_DOCKER_ENV:-}" ]; then
            host_source="$(dirname "${RUNNER_DOCKER_ENV}")/secrets/${name}"
          fi
          if [ -n "${host_source}" ] && [ -f "${host_source}" ]; then
            cp "${host_source}" "${target}"
          else
            printf "%s\n" "${fallback}" > "${target}"
          fi
          chmod 600 "${target}"
        }

        # Keep Compose secret mounts satisfiable even on fresh runner workspaces.
        seed_secret redis_password localdev
        seed_secret postgres_password localdev
        seed_secret flask_secret_key localdev
        seed_secret flask_security_password_salt localdev
        seed_secret wepp_auth_jwt_secrets localdev
        seed_secret agent_jwt_secret localdev
        seed_secret cap_secret localdev
        seed_secret oauth_github_client_secret localdev
        seed_secret oauth_google_client_secret localdev
        seed_secret zoho_noreply_email_password localdev
        seed_secret opentopography_api_key localdev
        seed_secret climate_engine_api_key localdev
    - name: Ensure weppcloud service is running
      run: |
        set -euo pipefail
        wctl up -d weppcloud
    - name: Run rq-engine contract guard scripts
      run: |
        set -euo pipefail
        wctl check-rq-contracts
    - name: Run rq-engine contract guard tests
      run: |
        set -euo pipefail
        wctl run-pytest \
          tests/tools/test_endpoint_inventory_guard.py \
          tests/tools/test_route_contract_checklist_guard.py \
          tests/microservices/test_rq_engine_openapi_contract.py
    - name: Remove redis data directory
      run: |
        set -euo pipefail
        if [ -d "${GITHUB_WORKSPACE}/.docker-data/redis" ]; then
          echo "Removing ${GITHUB_WORKSPACE}/.docker-data/redis"
          sudo rm -rf "${GITHUB_WORKSPACE}/.docker-data/redis"
        else
          echo "Redis data directory not present; nothing to remove."
        fi
    env:
      RUNNER_DOCKER_ENV: /workdir/wepppy/docker/.env
