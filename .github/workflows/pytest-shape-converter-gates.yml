# WARNING: This file is generated by scripts/build_forest_workflows.py. Do NOT edit directly.
name: Shape-Converter Gates
on:
  pull_request:
    paths:
    - wepppy/microservices/shape_converter/**
    - tests/shape_converter/**
    - docker/docker-compose.dev.yml
    - docker/caddy/Caddyfile
    - tools/check_broad_exceptions.py
    - scripts/build_forest_workflows.py
    - .github/forest_workflows/pytest-shape-converter-gates.yml
    - .github/forest_workflows/bootstrap.yml
    - .github/workflows/pytest-shape-converter-gates.yml
  push:
    branches:
    - master
    paths:
    - wepppy/microservices/shape_converter/**
    - tests/shape_converter/**
    - docker/docker-compose.dev.yml
    - docker/caddy/Caddyfile
    - tools/check_broad_exceptions.py
    - scripts/build_forest_workflows.py
    - .github/forest_workflows/pytest-shape-converter-gates.yml
    - .github/forest_workflows/bootstrap.yml
    - .github/workflows/pytest-shape-converter-gates.yml
  workflow_dispatch: null
jobs:
  pytest-shape-converter-gates:
    runs-on:
    - self-hosted
    - Linux
    - X64
    - homelab
    timeout-minutes: 90
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: false
    - name: Ensure docker/.env exists
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${RUNNER_DOCKER_ENV:-}" ] && [ -f "${RUNNER_DOCKER_ENV}" ]; then
          cp "${RUNNER_DOCKER_ENV}" docker/.env
          exit 0
        fi
        if [ ! -f docker/.env ]; then
          printf "%s\n" \
            "UID=1000" \
            "GID=993" \
            "POSTGRES_PASSWORD=localdev" \
            "SECRET_KEY=localdev" \
            "SECURITY_PASSWORD_SALT=localdev" \
            > docker/.env
        fi
    - name: Install wctl shim
      env:
        WCTL_SYMLINK_PATH: ${{ github.workspace }}/.wctl/bin/wctl
      run: |
        set -euo pipefail
        mkdir -p "${GITHUB_WORKSPACE}/.wctl/bin"
        chmod +x wctl/install.sh
        ./wctl/install.sh dev
        echo "${GITHUB_WORKSPACE}/.wctl/bin" >> "$GITHUB_PATH"
    - name: Run shape-converter focused regression sweep
      run: |
        set -euo pipefail
        wctl run-pytest tests/shape_converter/unit -k "archive or inspect or convert or cleanup or abuse or hardening or ui or health or crs or serialization" --maxfail=1
        wctl run-pytest tests/shape_converter/integration -k "inspect or convert or abuse or hardening or ui" --maxfail=1
    - name: Run shape-converter full unit and integration gates
      run: |
        set -euo pipefail
        wctl run-pytest tests/shape_converter/unit
        wctl run-pytest tests/shape_converter/integration
    - name: Run broad exception changed-file enforcement
      env:
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_BASE_REF: ${{ github.base_ref }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: |
        set -euo pipefail
        BASE_REF=""
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_REF="${PR_BASE_SHA:-}"
        elif [ "${{ github.event_name }}" = "push" ]; then
          BASE_REF="${PUSH_BEFORE_SHA:-}"
        fi
        if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
          BASE_REF="origin/master"
        fi

        if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "${PR_BASE_REF:-}" ]; then
          git fetch --no-tags --prune origin "${PR_BASE_REF}" || true
        else
          git fetch --no-tags --prune origin master || true
        fi

        if ! git rev-parse --verify --quiet "${BASE_REF}^{commit}" >/dev/null; then
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "${PR_BASE_REF:-}" ]; then
            BASE_REF="origin/${PR_BASE_REF}"
          else
            BASE_REF="origin/master"
          fi
        fi

        python3 tools/check_broad_exceptions.py --enforce-changed --base-ref "${BASE_REF}"
    - name: Verify generated forest workflows are in sync
      run: |
        set -euo pipefail
        scripts/build_forest_workflows.py --check
    - name: Remove redis data directory
      run: |
        set -euo pipefail
        if [ -d "${GITHUB_WORKSPACE}/.docker-data/redis" ]; then
          echo "Removing ${GITHUB_WORKSPACE}/.docker-data/redis"
          sudo rm -rf "${GITHUB_WORKSPACE}/.docker-data/redis"
        else
          echo "Redis data directory not present; nothing to remove."
        fi
    env:
      RUNNER_DOCKER_ENV: /workdir/wepppy/docker/.env
