# WARNING: This file is generated by scripts/build_forest_workflows.py. Do NOT edit directly.
name: NPM Coverage Nightly
on:
  schedule:
  - cron: 30 9 * * *
  workflow_dispatch: null
jobs:
  npm-coverage:
    runs-on:
    - self-hosted
    - Linux
    - X64
    - homelab
    timeout-minutes: 60
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        clean: false
    - name: Ensure docker/.env exists
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${RUNNER_DOCKER_ENV:-}" ] && [ -f "${RUNNER_DOCKER_ENV}" ]; then
          cp "${RUNNER_DOCKER_ENV}" docker/.env
          exit 0
        fi
        if [ ! -f docker/.env ]; then
          printf "%s\n" \
            "UID=1000" \
            "GID=993" \
            "POSTGRES_PASSWORD=localdev" \
            "SECRET_KEY=localdev" \
            "SECURITY_PASSWORD_SALT=localdev" \
            > docker/.env
        fi
    - name: Install wctl shim
      env:
        WCTL_SYMLINK_PATH: ${{ github.workspace }}/.wctl/bin/wctl
      run: |
        set -euo pipefail
        mkdir -p "${GITHUB_WORKSPACE}/.wctl/bin"
        chmod +x wctl/install.sh
        ./wctl/install.sh dev
        echo "${GITHUB_WORKSPACE}/.wctl/bin" >> "$GITHUB_PATH"
    - name: Run npm coverage suite
      run: |
        set -euo pipefail
        scripts/run-npm-coverage.sh
    - name: Upload npm coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: npm-coverage
        path: coverage/npm
        if-no-files-found: warn
    - name: Remove redis data directory
      run: |
        set -euo pipefail
        REDIS_DIR="${GITHUB_WORKSPACE}/.docker-data/redis"
        if [ ! -d "${REDIS_DIR}" ]; then
          echo "Redis data directory not present; nothing to remove."
          exit 0
        fi

        echo "Removing ${REDIS_DIR}"
        if rm -rf "${REDIS_DIR}" 2>/dev/null; then
          echo "Removed redis data directory without sudo."
          exit 0
        fi

        if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
          sudo -n rm -rf "${REDIS_DIR}"
          echo "Removed redis data directory with passwordless sudo."
          exit 0
        fi

        echo "Warning: unable to remove ${REDIS_DIR} without interactive sudo; continuing." >&2
    env:
      RUNNER_DOCKER_ENV: /workdir/wepppy/docker/.env
