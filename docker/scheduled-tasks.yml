version: 1
default_queue: default
initial_delay_seconds: 900
jitter_seconds: 300

tasks:
  - name: ttl_gc
    func: wepppy.rq.project_rq.gc_runs_rq
    interval_seconds: 86400
    queue: default
    job_timeout: 3600
    result_ttl: 86400
    kwargs:
      root: /wc1/runs
      limit: 200
      dry_run: false
  - name: access_log_compile
    func: wepppy.rq.project_rq.compile_dot_logs_rq
    interval_seconds: 86400
    queue: batch
    job_timeout: 36000
    result_ttl: 86400
  - name: usersum_docs_index
    func: wepppy.rq.project_rq.index_usersum_docs_rq
    interval_seconds: "${USERSUM_INDEX_INTERVAL_SECONDS:-14400}"
    queue: batch
    job_timeout: 3600
    result_ttl: 86400
    kwargs:
      write_index: false
      require_vendor_files: false
      sync_postgres: true
