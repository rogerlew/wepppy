x-wepppyo3-interchange-entrypoint: &wepppyo3-interchange-entrypoint
  - /opt/venv/bin/python
  - /workdir/wepppy/docker/wepppyo3-interchange-preflight.py
  - --

x-wepppy-image: &wepppy-image
  image: ${WEPPCLOUD_IMAGE:-wepppy:latest}
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      APP_USER: roger
      APP_GROUP: docker
      APP_UID: "${APP_UID:-1002}"
      APP_GID: "${APP_GID:-130}"

x-worker-env: &worker-env
  PYTHONUNBUFFERED: "1"
  MPLCONFIGDIR: /tmp/matplotlib
  # Base Redis URL without credentials; password is supplied via REDIS_PASSWORD_FILE.
  # Required for worker-only hosts because this stack does not define a redis service.
  # DB selection is normalized by the worker command.
  RQ_REDIS_URL: ${RQ_REDIS_URL:?Set RQ_REDIS_URL to a reachable Redis URL for worker stacks}
  REDIS_URL: ${RQ_REDIS_URL:?Set RQ_REDIS_URL to a reachable Redis URL for worker stacks}
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  SECRET_KEY_FILE: /run/secrets/flask_secret_key
  SECURITY_PASSWORD_SALT_FILE: /run/secrets/flask_security_password_salt
  POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
  WC1_DIR: /wc1
  GEODATA_DIR: /geodata
  OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
  CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
  GL_DASHBOARD_BATCH_ENABLED: ${GL_DASHBOARD_BATCH_ENABLED:-false}
  LOGLEVEL: INFO
  RQ_LOGGING_LEVEL: INFO
  WEPPCLOUDR_CONTAINER: ${WEPPCLOUDR_CONTAINER:-weppcloudr}
  RQ_REDIS_WAIT_TIMEOUT_SECONDS: ${RQ_REDIS_WAIT_TIMEOUT_SECONDS:-300}
  RQ_REDIS_WAIT_INTERVAL_SECONDS: ${RQ_REDIS_WAIT_INTERVAL_SECONDS:-1}
  RQ_REDIS_PROBE_CONNECT_TIMEOUT_SECONDS: ${RQ_REDIS_PROBE_CONNECT_TIMEOUT_SECONDS:-5}
  RQ_REDIS_PROBE_SOCKET_TIMEOUT_SECONDS: ${RQ_REDIS_PROBE_SOCKET_TIMEOUT_SECONDS:-5}
  RQ_WORKER_STARTUP_DELAY_SECONDS: ${RQ_WORKER_STARTUP_DELAY_SECONDS:-5}

x-discord-bot-token-secret: &discord-bot-token-secret
  source: discord_bot_token
  target: /workdir/weppcloud2/weppcloud2/discord_bot/.bot_token

x-worker-service: &worker-service
  <<: *wepppy-image
  init: true
  restart: unless-stopped
  working_dir: /workdir/wepppy
  env_file:
    - ${WEPPPY_ENV_FILE:-defaults.env}
  volumes:
    - ${WC1_DIR:-/geodata/wc1}:/wc1
    - ${GEODATA_DIR:-/geodata}:/geodata
    - /var/run/docker.sock:/var/run/docker.sock

services:
  f-esri:
    image: ${F_ESRI_IMAGE:-wepppy-f-esri:latest}
    container_name: ${F_ESRI_CONTAINER:-wepppy-f-esri}
    build:
      context: ..
      dockerfile: docker/Dockerfile.f-esri
    restart: unless-stopped
    init: true
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ${WC1_DIR:-/geodata/wc1}:/wc1
      - ${GEODATA_DIR:-/geodata}:/geodata

  rq-worker:
    <<: *worker-service
    entrypoint: *wepppyo3-interchange-entrypoint
    depends_on:
      f-esri:
        condition: service_started
      weppcloudr:
        condition: service_healthy
    cpuset: "${RQ_WORKER_CPUSET:-0-47}"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    secrets:
      - redis_password
      - postgres_password
      - flask_secret_key
      - flask_security_password_salt
      - *discord-bot-token-secret
      - opentopography_api_key
      - climate_engine_api_key
    environment:
      <<: *worker-env
    command:
      - bash
      - -lc
      - |
        exec /workdir/wepppy/docker/rq-worker-startup.sh 6 default

  rq-worker-batch:
    <<: *worker-service
    entrypoint: *wepppyo3-interchange-entrypoint
    depends_on:
      f-esri:
        condition: service_started
      weppcloudr:
        condition: service_healthy
    cpuset: "${RQ_WORKER_CPUSET:-0-47}"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    secrets:
      - redis_password
      - postgres_password
      - flask_secret_key
      - flask_security_password_salt
      - *discord-bot-token-secret
      - opentopography_api_key
      - climate_engine_api_key
    environment:
      <<: *worker-env
      WEPPPY_NCPU: ${WEPPPY_NCPU:-6}
      PERIDOT_CPU: ${PERIDOT_CPU:-4}
    command:
      - bash
      - -lc
      - |
        exec /workdir/wepppy/docker/rq-worker-startup.sh 4 batch

  weppcloudr:
    image: ${WEPPCLOUDR_IMAGE:-weppcloudr:latest}
    build:
      context: ..
      dockerfile: weppcloudR/Dockerfile
    restart: unless-stopped
    container_name: weppcloudr
    cpuset: "${WEPPCLOUDR_CPUSET:-0-47}"
    environment:
      PORT: ${WEPPCLOUDR_PORT:-8050}
      TEMPLATE_ROOT: /srv/weppcloudr/templates/scripts/users/chinmay
      DEVAL_TEMPLATE: /srv/weppcloudr/templates/scripts/users/chinmay/new_report.Rmd
    volumes:
      - ${WC1_DIR:-/geodata/wc1}:/wc1
      - ${GEODATA_DIR:-/geodata}:/geodata
      - weppcloudr-renv-cache:/opt/weppcloudr/renv/cache
    ports:
      - "${WEPPCLOUDR_PORT:-8050}:${WEPPCLOUDR_PORT:-8050}"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS "http://localhost:${WEPPCLOUDR_PORT:-8050}/healthz" >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 10

volumes:
  weppcloudr-renv-cache:

secrets:
  redis_password:
    file: ./secrets/redis_password
  postgres_password:
    file: ./secrets/postgres_password
  flask_secret_key:
    file: ./secrets/flask_secret_key
  flask_security_password_salt:
    file: ./secrets/flask_security_password_salt
  discord_bot_token:
    file: ${DISCORD_BOT_TOKEN_FILE:-/dev/null}
  opentopography_api_key:
    file: ./secrets/opentopography_api_key
  climate_engine_api_key:
    file: ./secrets/climate_engine_api_key
