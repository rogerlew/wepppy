x-wepppy-image: &wepppy-image
  image: ${WEPPCLOUD_IMAGE:-wepppy:latest}
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      APP_USER: roger
      APP_GROUP: docker
      APP_UID: "${APP_UID:-1002}"
      APP_GID: "${APP_GID:-130}"

x-worker-env: &worker-env
  PYTHONUNBUFFERED: "1"
  MPLCONFIGDIR: /tmp/matplotlib
  RQ_REDIS_URL: ${RQ_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/9}
  REDIS_URL: ${RQ_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/9}
  WC1_DIR: /wc1
  GEODATA_DIR: /geodata
  OPENTOPOGRAPHY_API_KEY: ${OPENTOPOGRAPHY_API_KEY}
  CLIMATE_ENGINE_API_KEY: ${CLIMATE_ENGINE_API_KEY}
  LOGLEVEL: INFO
  RQ_LOGGING_LEVEL: INFO
  WEPPCLOUDR_CONTAINER: ${WEPPCLOUDR_CONTAINER:-weppcloudr}

x-worker-service: &worker-service
  <<: *wepppy-image
  init: true
  restart: unless-stopped
  working_dir: /workdir/wepppy
  env_file:
    - ${WEPPPY_ENV_FILE:-docker/.env}
  volumes:
    - ${WC1_DIR:-/geodata/wc1}:/wc1
    - ${GEODATA_DIR:-/geodata}:/geodata
    - /var/run/docker.sock:/var/run/docker.sock

services:
  rq-worker:
    <<: *worker-service
    cpuset: "${RQ_WORKER_CPUSET:-0-47}"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    environment:
      <<: *worker-env
    command:
      - rq
      - worker-pool
      - -n
      - "6"
      - -u
      - ${RQ_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/9}
      - --logging-level
      - INFO
      - --worker-class
      - wepppy.rq.WepppyRqWorker
      - default

  rq-worker-batch:
    <<: *worker-service
    cpuset: "${RQ_WORKER_CPUSET:-0-47}"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    environment:
      <<: *worker-env
      WEPPPY_NCPU: ${WEPPPY_NCPU:-6}
      PERIDOT_CPU: ${PERIDOT_CPU:-4}
    command:
      - rq
      - worker-pool
      - -n
      - "4"
      - -u
      - ${RQ_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/9}
      - --logging-level
      - INFO
      - --worker-class
      - wepppy.rq.WepppyRqWorker
      - batch

  weppcloudr:
    image: ${WEPPCLOUDR_IMAGE:-weppcloudr:latest}
    build:
      context: ..
      dockerfile: weppcloudR/Dockerfile
    restart: unless-stopped
    container_name: weppcloudr
    cpuset: "${WEPPCLOUDR_CPUSET:-0-47}"
    environment:
      PORT: ${WEPPCLOUDR_PORT:-8050}
      TEMPLATE_ROOT: /srv/weppcloudr/templates/scripts/users/chinmay
      DEVAL_TEMPLATE: /srv/weppcloudr/templates/scripts/users/chinmay/new_report.Rmd
    volumes:
      - ${WC1_DIR:-/geodata/wc1}:/wc1
      - ${GEODATA_DIR:-/geodata}:/geodata
      - weppcloudr-renv-cache:/opt/weppcloudr/renv/cache
    ports:
      - "${WEPPCLOUDR_PORT:-8050}:${WEPPCLOUDR_PORT:-8050}"

volumes:
  weppcloudr-renv-cache:
