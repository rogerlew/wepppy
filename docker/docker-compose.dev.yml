x-wepppy-service: &wepppy-service
  build:
    context: ..
    dockerfile: docker/Dockerfile.dev
  image: wepppy-dev
  init: true
  user: "${UID:-1000}:${GID:-993}"
  working_dir: /workdir/wepppy
  environment: &wepppy-env
    PYTHONUNBUFFERED: "1"
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    REDIS_HOST: redis
    REDIS_PASSWORD_FILE: /run/secrets/redis_password
    MPLCONFIGDIR: /tmp/matplotlib
    SITE_PREFIX: /weppcloud
    CAO_BASE_URL: ${CAO_BASE_URL:-http://host.docker.internal:9889}
    DTALE_SERVICE_URL: ${DTALE_SERVICE_URL:-http://dtale:9010}
    TEST_SUPPORT_ENABLED: ${TEST_SUPPORT_ENABLED:-false}
    GL_DASHBOARD_BATCH_ENABLED: ${GL_DASHBOARD_BATCH_ENABLED:-false}
    ENABLE_LOCAL_LOGIN: ${ENABLE_LOCAL_LOGIN:-true}
    PROFILE_PLAYBACK_RUN_ROOT: ${PROFILE_PLAYBACK_RUN_ROOT:-/workdir/wepppy-test-engine-data/playback/runs}
    PROFILE_PLAYBACK_FORK_ROOT: ${PROFILE_PLAYBACK_FORK_ROOT:-/workdir/wepppy-test-engine-data/playback/fork}
    PROFILE_PLAYBACK_ARCHIVE_ROOT: ${PROFILE_PLAYBACK_ARCHIVE_ROOT:-/workdir/wepppy-test-engine-data/playback/archive}
    PROFILE_PLAYBACK_USE_CLONE: ${PROFILE_PLAYBACK_USE_CLONE:-true}
    ENABLE_PROFILE_COVERAGE: ${ENABLE_PROFILE_COVERAGE:-false}
    DEV_MODE: ${DEV_MODE:-false}
    WEPPPY_SOURCE_ROOT: ${WEPPPY_SOURCE_ROOT:-/workdir/wepppy}
  env_file:
    - ${WEPPPY_ENV_FILE:-defaults.env}
  secrets:
    - redis_password
  volumes:
    - ../:/workdir/wepppy
    - ../../rosetta:/workdir/rosetta
    - ../../peridot:/workdir/peridot
    - ../../weppcloud-wbt:/workdir/weppcloud-wbt
    - ../../wepppyo3:/workdir/wepppyo3
    - ../../wepppy-test-engine-data:/workdir/wepppy-test-engine-data
    - ${WC1_DIR}:/wc1
    - ${GEODATA_DIR}:/geodata
    - /var/run/docker.sock:/var/run/docker.sock
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  weppcloud:
    <<: *wepppy-service
    container_name: weppcloud
    shm_size: "1g"
    secrets:
      - redis_password
      - postgres_password
      - flask_secret_key
      - flask_security_password_salt
      - wepp_auth_jwt_secrets
      - agent_jwt_secret
      - cap_secret
      - oauth_github_client_secret
      - oauth_google_client_secret
      - zoho_noreply_email_password
      - opentopography_api_key
      - climate_engine_api_key
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    entrypoint: ./docker/weppcloud-entrypoint.sh
    command:
      - gunicorn
      - --workers
      - "4"
      - --threads
      - "2"
      - --timeout
      - "1800"
      - --bind
      - 0.0.0.0:8000
      - --log-level
      - info
      - --forwarded-allow-ips
      - "192.168.1.1"
      - --reload
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.weppcloud.app:app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *wepppy-env
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      SECURITY_PASSWORD_SALT_FILE: /run/secrets/flask_security_password_salt
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      WEPP_AUTH_JWT_SECRETS_FILE: /run/secrets/wepp_auth_jwt_secrets
      AGENT_JWT_SECRET_FILE: /run/secrets/agent_jwt_secret
      CAP_SECRET_FILE: /run/secrets/cap_secret
      OAUTH_GITHUB_CLIENT_SECRET_FILE: /run/secrets/oauth_github_client_secret
      OAUTH_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/oauth_google_client_secret
      ZOHO_NOREPLY_EMAIL_PASSWORD_FILE: /run/secrets/zoho_noreply_email_password
      OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
      CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
      PLAYWRIGHT_BROWSERS_PATH: /workdir/wepppy/weppcloud/static-src/.playwright-browsers
      PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: "1"

  status:
    build:
      context: ..
      dockerfile: services/status2/Dockerfile
    image: status2-dev
    container_name: weppcloud-status
    # Compose secrets are bind-mounted; run as the secret-file owner so 0600 files are readable.
    user: "${UID:-1000}:${GID:-1000}"
    secrets:
      - redis_password
    environment:
      STATUS_REDIS_URL: ${STATUS_REDIS_URL:-redis://redis:6379/2}
      STATUS_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      STATUS_LISTEN_ADDR: 0.0.0.0:9002
      STATUS_LOG_LEVEL: info
      STATUS_METRICS_ENABLED: "true"
    ports:
      - "9002:9002"
    depends_on:
      redis:
        condition: service_healthy

  status-build:
    image: golang:1.25-alpine
    container_name: weppcloud-status-build
    working_dir: /workspace/services/status2
    volumes:
      - ..:/workspace
      - type: volume
        source: status_go_cache
        target: /go
    environment:
      GOMODCACHE: /go/pkg/mod
    depends_on:
      redis:
        condition: service_started

  preflight-build:
    image: golang:1.25-alpine
    container_name: weppcloud-preflight-build
    working_dir: /workspace/services/preflight2
    volumes:
      - ..:/workspace
      - type: volume
        source: preflight_go_cache
        target: /go
    environment:
      GOMODCACHE: /go/pkg/mod
    depends_on:
      redis:
        condition: service_started

  preflight:
    build:
      context: ..
      dockerfile: services/preflight2/Dockerfile
    image: preflight2-dev
    container_name: weppcloud-preflight
    # Compose secrets are bind-mounted; run as the secret-file owner so 0600 files are readable.
    user: "${UID:-1000}:${GID:-1000}"
    secrets:
      - redis_password
    environment:
      PREFLIGHT_REDIS_URL: ${PREFLIGHT_REDIS_URL:-redis://redis:6379/0}
      PREFLIGHT_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      PREFLIGHT_LISTEN_ADDR: 0.0.0.0:9001
      PREFLIGHT_LOG_LEVEL: info
      PREFLIGHT_METRICS_ENABLED: "true"
    ports:
      - "9001:9001"
    depends_on:
      redis:
        condition: service_healthy

  cap:
    build:
      context: ..
      dockerfile: services/cap/Dockerfile.dev
      args:
        CAP_REPO: ${CAP_REPO:-https://github.com/tiagozip/cap}
        CAP_REF: ${CAP_REF:-main}
    image: wepppy-cap-dev
    container_name: wepppy-cap
    secrets:
      - cap_secret
    environment:
      CAP_SITE_KEY: ${CAP_SITE_KEY}
      CAP_SECRET_FILE: /run/secrets/cap_secret
      CAP_CORS_ORIGIN: ${CAP_CORS_ORIGIN:-*}
      CAP_ASSET_ROOT: /opt/cap
      CAP_DATA_DIR: /var/lib/cap
    volumes:
      - cap-data:/var/lib/cap
    expose:
      - "3000"

  profile-playback:
    <<: *wepppy-service
    container_name: profile-playback
    secrets:
      - redis_password
      - admin_password
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - uvicorn
      - services.profile_playback.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8070"
    environment:
      <<: *wepppy-env
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      PROFILE_PLAYBACK_BASE_URL: ${PROFILE_PLAYBACK_BASE_URL:-http://weppcloud:8000/weppcloud}
      PROFILE_PLAYBACK_ROOT: ${PROFILE_PLAYBACK_ROOT:-/workdir/wepppy-test-engine-data/profiles}
    ports:
      - "8070:8070"
    depends_on:
      weppcloud:
        condition: service_started
    dns:
      - 8.8.8.8
      - 1.1.1.1

  browse:
    <<: *wepppy-service
    container_name: wepppy-browse
    secrets:
      - redis_password
      - wepp_auth_jwt_secrets
      - dtale_internal_token
    environment:
      <<: *wepppy-env
      WEPP_AUTH_JWT_SECRETS_FILE: /run/secrets/wepp_auth_jwt_secrets
      DTALE_INTERNAL_TOKEN_FILE: /run/secrets/dtale_internal_token
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    command:
      - gunicorn
      - --workers
      - "3"
      - --bind
      - 0.0.0.0:9009
      - --log-level
      - info
      - -k
      - uvicorn.workers.UvicornWorker
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.microservices.browse:app
    ports:
      - "9009:9009"

  dtale:
    <<: *wepppy-service
    container_name: wepppy-dtale
    secrets:
      - redis_password
      - dtale_internal_token
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "1"
      - --bind
      - 0.0.0.0:9010
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.dtale:app
    environment:
      <<: *wepppy-env
      DTALE_BASE_URL: http://dtale:9010
      DTALE_INTERNAL_TOKEN_FILE: /run/secrets/dtale_internal_token
    ports:
      - "9010:9010"
    depends_on:
      redis:
        condition: service_started

  elevationquery:
    <<: *wepppy-service
    container_name: wepppy-elevationquery
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "2"
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8002
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.microservices.elevationquery:app
    ports:
      - "8002:8002"

  metquery:
    <<: *wepppy-service
    container_name: wepppy-metquery
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "2"
      - --bind
      - 0.0.0.0:8004
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.metquery:app
    ports:
      - "8004:8004"

  wmesque:
    <<: *wepppy-service
    container_name: wepppy-wmesque
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "2"
      - --bind
      - 0.0.0.0:8003
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.wmesque:app
    ports:
      - "8003:8003"

  wmesque2:
    <<: *wepppy-service
    container_name: wepppy-wmesque2
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "4"
      - --bind
      - 0.0.0.0:8030
      - --log-level
      - info
      - -k
      - uvicorn.workers.UvicornWorker
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.wmesque2:app
    ports:
      - "8030:8030"

  query-engine:
    <<: *wepppy-service
    container_name: wepppy-query-engine
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    secrets:
      - redis_password
      - wepp_mcp_jwt_secret
    environment:
      <<: *wepppy-env
      EXTERNAL_HOST: ${EXTERNAL_HOST}
      EXTERNAL_HOST_DESCRIPTION: ${EXTERNAL_HOST_DESCRIPTION}
      WEPP_MCP_JWT_SECRET_FILE: /run/secrets/wepp_mcp_jwt_secret
    command:
      - uvicorn
      - wepppy.query_engine.app.server:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8041"
      - --reload
    ports:
      - "8041:8041"

  rq-engine:
    <<: *wepppy-service
    container_name: wepppy-rq-engine
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    secrets:
      - redis_password
      - postgres_password
      - flask_secret_key
      - flask_security_password_salt
      - wepp_auth_jwt_secrets
      - cap_secret
    environment:
      <<: *wepppy-env
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      SECURITY_PASSWORD_SALT_FILE: /run/secrets/flask_security_password_salt
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      WEPP_AUTH_JWT_SECRETS_FILE: /run/secrets/wepp_auth_jwt_secrets
      CAP_SECRET_FILE: /run/secrets/cap_secret
    command:
      - uvicorn
      - wepppy.microservices.rq_engine:app
      - --host
      - 0.0.0.0
      - --port
      - "8042"
      - --reload
    ports:
      - "8042:8042"

  weppcloudr:
    build:
      context: ..
      dockerfile: weppcloudR/Dockerfile
    image: weppcloudr-dev
    container_name: weppcloudr
    environment:
      PORT: "8050"
      TEMPLATE_ROOT: /srv/weppcloudr/templates/scripts/users/chinmay
      DEVAL_TEMPLATE: /srv/weppcloudr/templates/scripts/users/chinmay/new_report.Rmd
    volumes:
      - ../weppcloudR:/srv/weppcloudr
      - ../WEPPcloudR:/srv/original-weppcloudr
      - ${GEODATA_DIR}:/geodata
      - ${WC1_DIR}:/wc1
      - weppcloudr-renv-cache:/opt/weppcloudr/renv/cache
    ports:
      - "8050:8050"

  rq-worker:
    <<: *wepppy-service
    container_name: wepppy-rq-worker
    cpuset: "0-39"
    shm_size: "8g"
    secrets:
      - redis_password
      - opentopography_api_key
      - climate_engine_api_key
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        REDIS_PASSWORD="$(cat /run/secrets/redis_password)"
        exec /opt/venv/bin/rq worker-pool -n "6" -u "redis://:$$REDIS_PASSWORD@redis:6379/9" --logging-level INFO --worker-class wepppy.rq.WepppyRqWorker default
    environment:
      <<: *wepppy-env
      LOGLEVEL: DEBUG
      RQ_LOGGING_LEVEL: DEBUG
      REDIS_HOST: redis
      MPLCONFIGDIR: /tmp/matplotlib
      OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
      CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
    depends_on:
      redis:
        condition: service_started

  rq-worker-batch:
    <<: *wepppy-service
    container_name: wepppy-rq-worker-batch
    cpuset: "0-39"
    shm_size: "8g"
    secrets:
      - redis_password
      - opentopography_api_key
      - climate_engine_api_key
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        REDIS_PASSWORD="$(cat /run/secrets/redis_password)"
        exec /opt/venv/bin/rq worker-pool -n "4" -u "redis://:$$REDIS_PASSWORD@redis:6379/9" --logging-level INFO --worker-class wepppy.rq.WepppyRqWorker batch
    environment:
      <<: *wepppy-env
      LOGLEVEL: DEBUG
      RQ_LOGGING_LEVEL: DEBUG
      REDIS_HOST: redis
      MPLCONFIGDIR: /tmp/matplotlib
      WEPPPY_NCPU: "6"
      PERIDOT_CPU: "4"
      OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
      CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
    depends_on:
      redis:
        condition: service_started

  webpush:
    <<: *wepppy-service
    container_name: wepppy-webpush
    command:
      - bash
      - -lc
      - |
        echo "webpush service placeholder – update command once implementation is available.";
        tail -f /dev/null
    profiles: ["webpush"]

  f-esri:
    build:
      context: ..
      dockerfile: docker/Dockerfile.f-esri
    image: wepppy-f-esri
    container_name: wepppy-f-esri
    init: true
    user: "${UID:-1000}:${GID:-993}"
    working_dir: /workdir/wepppy
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ../:/workdir/wepppy
      - ../../rosetta:/workdir/rosetta
      - ../../peridot:/workdir/peridot
      - ../../weppcloud-wbt:/workdir/weppcloud-wbt
      - ../../wepppyo3:/workdir/wepppyo3
      - ${WC1_DIR}:/wc1
      - ${GEODATA_DIR}:/geodata

  redis:
    image: redis:latest
    container_name: wepppy-redis
    secrets:
      - redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-yes}
      REDIS_APPENDFSYNC: ${REDIS_APPENDFSYNC:-everysec}
      REDIS_SAVE_SCHEDULE: ${REDIS_SAVE_SCHEDULE:-900 1 300 10 60 10000}
      REDIS_AOF_USE_RDB_PREAMBLE: ${REDIS_AOF_USE_RDB_PREAMBLE:-yes}
    entrypoint: ["/usr/local/bin/redis-entrypoint.sh"]
    ports:
      - "6379:6379"
    volumes:
      - ../.docker-data/redis:/data
      - ./redis-entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" -h 127.0.0.1 -p 6379 ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16
    container_name: wepppy-postgres
    stop_grace_period: 120s
    secrets:
      - postgres_password
    environment:
      POSTGRES_DB: wepppy
      POSTGRES_USER: wepppy
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "5432:5432"
    volumes:
      - ../.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  postgres-backup:
    image: postgres:16
    container_name: wepppy-postgres-backup
    restart: unless-stopped
    secrets:
      - postgres_password
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: wepppy
      PGDATABASE: wepppy
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_INTERVAL_SECONDS: 86400
    volumes:
      - ../.docker-data/postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h $${PGHOST} -U $${PGUSER} -d $${PGDATABASE}"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        mkdir -p "$${BACKUP_DIR:-/backups}"

        if [ ! -f /run/secrets/postgres_password ]; then
          echo "[postgres-backup] Missing /run/secrets/postgres_password" >&2
          exit 1
        fi

        password="$$(cat /run/secrets/postgres_password)"
        if [ -z "$$password" ]; then
          echo "[postgres-backup] /run/secrets/postgres_password is empty" >&2
          exit 1
        fi

        pgpass_file="/tmp/.pgpass"
        umask 077
        printf "%s:%s:%s:%s:%s\\n" "$${PGHOST}" "$${PGPORT:-5432}" "$${PGDATABASE}" "$${PGUSER}" "$$password" > "$$pgpass_file"
        export PGPASSFILE="$$pgpass_file"

        # Run initial backup on startup
        run_backup() {
          ts=$$(date +"%Y%m%d-%H%M%S")
          target="$${BACKUP_DIR:-/backups}/weppcloud-$${ts}.dump"
          tmp_target="$${target}.tmp"

          echo "[ $$(date --iso-8601=seconds) ] Starting backup to $$target"

          # Dump to temp file first, then atomic rename
          if pg_dump -h "$${PGHOST}" -U "$${PGUSER}" -d "$${PGDATABASE}" -Fc -f "$$tmp_target"; then
            mv "$$tmp_target" "$$target"

            # Verify backup header
            if head -c 5 "$$target" | grep -q "PGDMP"; then
              size=$$(du -h "$$target" | cut -f1)
              echo "[ $$(date --iso-8601=seconds) ] Backup complete: $$target ($$size)"
            else
              echo "[ $$(date --iso-8601=seconds) ] ERROR: Backup verification failed - invalid header"
              rm -f "$$target"
              return 1
            fi
          else
            echo "[ $$(date --iso-8601=seconds) ] ERROR: pg_dump failed"
            rm -f "$$tmp_target"
            return 1
          fi

          # Purge old backups
          echo "[ $$(date --iso-8601=seconds) ] Purging backups older than $${BACKUP_KEEP_DAYS:-7} days"
          find "$${BACKUP_DIR:-/backups}" -name "weppcloud-*.dump" -type f -mtime +$${BACKUP_KEEP_DAYS:-7} -delete

          # Also purge legacy named backups
          find "$${BACKUP_DIR:-/backups}" -name "wepppy-*.dump" -type f -mtime +$${BACKUP_KEEP_DAYS:-7} -delete

          # List current backups
          echo "[ $$(date --iso-8601=seconds) ] Current backups:"
          ls -lh "$${BACKUP_DIR:-/backups}"/*.dump 2>/dev/null || echo "  (none)"
        }

        # Initial backup
        run_backup || echo "Initial backup failed, will retry on schedule"

        # Scheduled backups
        while true; do
          sleep $${BACKUP_INTERVAL_SECONDS:-86400}
          run_backup || echo "Scheduled backup failed"
        done

  scheduler:
    <<: *wepppy-service
    container_name: wepppy-scheduler
    depends_on:
      redis:
        condition: service_started
    environment:
      <<: *wepppy-env
      SCHEDULE_CONFIG: /workdir/wepppy/docker/scheduled-tasks.yml
      SCHEDULE_SLEEP_SECONDS: "30"
      SCHEDULE_LOG_LEVEL: INFO
    command:
      - python
      - -m
      - wepppy.tools.scheduler

  rq-dashboard:
    build:
      context: ../..
      dockerfile: wepppy/docker/Dockerfile.rq-dashboard
    container_name: wepppy-rq-dashboard
    secrets:
      - redis_password
    environment:
      RQ_DASHBOARD_URL_PREFIX: /rq-dashboard
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    volumes:
      - ../../rq-dashboard:/rq-dashboard
    working_dir: /rq-dashboard
    expose:
      - "9181"
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        password="$$(cat /run/secrets/redis_password)"
        export RQ_DASHBOARD_REDIS_URL="redis://:$$password@redis:6379/9"
        exec gunicorn --bind 0.0.0.0:9181 --workers "2" --threads "2" --timeout "30" --log-level info "rq_dashboard.app:create_app()"
    depends_on:
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    container_name: wepppy-caddy
    ports:
      - "8080:8080"
    volumes:
      - ${CADDY_FILE}:/etc/caddy/Caddyfile:ro
      - ../wepppy/weppcloud/static:/srv/weppcloud/static:ro
    depends_on:
      - weppcloud
      - status
      - preflight
      - cap
      - browse
      - dtale
      - weppcloudr
      - rq-dashboard
      - profile-playback
      - fcgiwrap

  fcgiwrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fcgiwrap
    volumes:
      - ../:/workdir/wepppy
      - ${WC1_DIR}:/wc1
      - ${GEODATA_DIR}:/geodata
    expose:
      - "9000"

networks:
  default:
    name: wepppy-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  weppcloudr-renv-cache:
    driver: local
  status_go_cache:
    driver: local
  preflight_go_cache:
    driver: local
  cap-data:
    driver: local

secrets:
  redis_password:
    file: ./secrets/redis_password
  postgres_password:
    file: ./secrets/postgres_password
  flask_secret_key:
    file: ./secrets/flask_secret_key
  flask_security_password_salt:
    file: ./secrets/flask_security_password_salt
  wepp_auth_jwt_secrets:
    file: ./secrets/wepp_auth_jwt_secrets
  agent_jwt_secret:
    file: ./secrets/agent_jwt_secret
  wepp_mcp_jwt_secret:
    file: ./secrets/wepp_mcp_jwt_secret
  dtale_internal_token:
    file: ./secrets/dtale_internal_token
  cap_secret:
    file: ./secrets/cap_secret
  oauth_github_client_secret:
    file: ./secrets/oauth_github_client_secret
  oauth_google_client_secret:
    file: ./secrets/oauth_google_client_secret
  zoho_noreply_email_password:
    file: ./secrets/zoho_noreply_email_password
  opentopography_api_key:
    file: ./secrets/opentopography_api_key
  climate_engine_api_key:
    file: ./secrets/climate_engine_api_key
  admin_password:
    file: ./secrets/admin_password
