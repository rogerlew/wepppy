x-wepp1-volumes: &wepp1-volumes
  - /geodata/wc1:/wc1
  - /geodata:/geodata

x-wepppy-env: &wepppy-env
  CLIMATE_ENGINE_API_KEY: ${CLIMATE_ENGINE_API_KEY}
  GL_DASHBOARD_BATCH_ENABLED: ${GL_DASHBOARD_BATCH_ENABLED:-false}
  WEPPPY_SOURCE_ROOT: ${WEPPPY_SOURCE_ROOT:-/workdir/wepppy}

x-wepppy-image: &wepppy-image
  image: ${WEPPCLOUD_IMAGE:-wepppy:latest}
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      APP_USER: roger
      APP_GROUP: docker
      APP_UID: "1002"
      APP_GID: "130"
  environment:
    <<: *wepppy-env

services:
  fcgiwrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fcgiwrap
      args:
        BASE_IMAGE: ${WEPPCLOUD_IMAGE:-wepppy:latest}
    image: wepppy-fcgiwrap
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata

  caddy:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /workdir/wepppy/docker/caddy/Caddyfile.wepp1:/etc/caddy/Caddyfile:ro
      - ../wepppy/weppcloud/static:/srv/weppcloud/static:ro
      - /geodata:/geodata:ro
      - caddy-data:/data
      - caddy-config:/config
  cap:
    environment:
      CAP_ASSET_ROOT: /opt/cap
  weppcloud:
    <<: *wepppy-image
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - ../wepppy/weppcloud/static:/srv/weppcloud/static
    command:
      - gunicorn
      - --workers
      - "8"
      - --threads
      - "4"
      - --timeout
      - "1800"
      - --bind
      - 0.0.0.0:8000
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.weppcloud.app:app
  browse:
    <<: *wepppy-image
    volumes: *wepp1-volumes
    command:
      - gunicorn
      - --workers
      - "8"
      - --bind
      - 0.0.0.0:9009
      - --log-level
      - info
      - -k
      - uvicorn.workers.UvicornWorker
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.microservices.browse:app
  dtale:
    <<: *wepppy-image
    volumes: *wepp1-volumes
  profile-playback:
    <<: *wepppy-image
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - ${PROFILE_PLAYBACK_DATA_DIR:-/workdir/wepppy-test-engine-data}:/workdir/wepppy-test-engine-data
  elevationquery:
    <<: *wepppy-image
    volumes: *wepp1-volumes
  metquery:
    <<: *wepppy-image
    volumes: *wepp1-volumes
  wmesque:
    <<: *wepppy-image
    volumes: *wepp1-volumes
  wmesque2:
    <<: *wepppy-image
    volumes: *wepp1-volumes
  query-engine:
    <<: *wepppy-image
    volumes: *wepp1-volumes
  rq-engine:
    <<: *wepppy-image
    volumes: *wepp1-volumes
    environment:
      <<: *wepppy-env
      RQ_ENGINE_POLL_RATE_LIMIT_COUNT: "400"
      RQ_ENGINE_POLL_RATE_LIMIT_WINDOW_SECONDS: "60"
  rq-worker:
    <<: *wepppy-image
    cpuset: "0-31"
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - /var/run/docker.sock:/var/run/docker.sock
  rq-worker-batch:
    <<: *wepppy-image
    cpuset: "0-31"
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      <<: *wepppy-env
      PERIDOT_CPU: "4"
  scheduler:
    <<: *wepppy-image
    environment:
      <<: *wepppy-env
      SCHEDULE_CONFIG: /workdir/wepppy/docker/scheduled-tasks.yml
      SCHEDULE_SLEEP_SECONDS: "30"
      SCHEDULE_LOG_LEVEL: INFO
    command:
      - python
      - -m
      - wepppy.tools.scheduler
  weppcloudr:
    container_name: weppcloudr
    volumes:
      - /geodata:/geodata
      - /geodata/wc1:/wc1
      - weppcloudr-renv-cache:/opt/weppcloudr/renv/cache

volumes:
  caddy-data:
  caddy-config:
