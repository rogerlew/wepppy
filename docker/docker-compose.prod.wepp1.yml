x-wepp1-volumes: &wepp1-volumes
  - /geodata/wc1:/wc1
  - /geodata:/geodata

x-wepppy-env: &wepppy-env
  CLIMATE_ENGINE_API_KEY: ${CLIMATE_ENGINE_API_KEY}

x-wepppy-image: &wepppy-image
  image: ${WEPPCLOUD_IMAGE:-wepppy:latest}
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      APP_USER: roger
      APP_GROUP: docker
      APP_UID: "1002"
      APP_GID: "130"
  environment:
    <<: *wepppy-env

services:
  caddy:
    cpuset: "48-55"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /workdir/wepppy/docker/caddy/Caddyfile.wepp1:/etc/caddy/Caddyfile:ro
      - ../wepppy/weppcloud/static:/srv/weppcloud/static:ro
      - /geodata:/geodata:ro
      - caddy-data:/data
      - caddy-config:/config
  cap:
    environment:
      CAP_ASSET_ROOT: /opt/cap
  weppcloud:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - ../wepppy/weppcloud/static:/srv/weppcloud/static
  browse:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  dtale:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  profile-playback:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - ${PROFILE_PLAYBACK_DATA_DIR:-/workdir/wepppy-test-engine-data}:/workdir/wepppy-test-engine-data
  elevationquery:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  metquery:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  wmesque:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  wmesque2:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  query-engine:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  rq-engine:
    <<: *wepppy-image
    cpuset: "48-55"
    volumes: *wepp1-volumes
  rq-worker:
    <<: *wepppy-image
    cpuset: "0-47"
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - /var/run/docker.sock:/var/run/docker.sock
  rq-worker-batch:
    <<: *wepppy-image
    cpuset: "0-47"
    volumes:
      - /geodata/wc1:/wc1
      - /geodata:/geodata
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      <<: *wepppy-env
      PERIDOT_CPU: "4"
  weppcloudr:
    container_name: weppcloudr
    cpuset: "48-55"
    volumes:
      - /geodata:/geodata
      - /geodata/wc1:/wc1
      - weppcloudr-renv-cache:/opt/weppcloudr/renv/cache

volumes:
  caddy-data:
  caddy-config:
