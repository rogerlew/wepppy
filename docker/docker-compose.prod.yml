    file: ./secrets/flask_security_password_salt
  wepp_auth_jwt_secrets:
    file: ./secrets/wepp_auth_jwt_secrets
  agent_jwt_secret:
    file: ./secrets/agent_jwt_secret
  wepp_mcp_jwt_secret:
    file: ./secrets/wepp_mcp_jwt_secret
  dtale_internal_token:
    file: ./secrets/dtale_internal_token
  cap_secret:
    file: ./secrets/cap_secret
  oauth_github_client_secret:
    file: ./secrets/oauth_github_client_secret
  oauth_google_client_secret:
    file: ./secrets/oauth_google_client_secret
  zoho_noreply_email_password:
