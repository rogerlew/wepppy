x-wepppy-image: &wepppy-image
  image: ${WEPPCLOUD_IMAGE:-wepppy:latest}
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      APP_USER: roger
      APP_GROUP: docker
      APP_UID: "1000"
      APP_GID: "993"

x-wepppy-env: &wepppy-env
  PYTHONUNBUFFERED: "1"
  MPLCONFIGDIR: /tmp/matplotlib
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  SITE_PREFIX: ${SITE_PREFIX:-/weppcloud}
  EXTERNAL_HOST: ${EXTERNAL_HOST:-}
  EXTERNAL_HOST_DESCRIPTION: ${EXTERNAL_HOST_DESCRIPTION:-}
  WC1_DIR: /wc1
  GEODATA_DIR: /geodata
  DTALE_SERVICE_URL: ${DTALE_SERVICE_URL:-http://dtale:9010}
  GL_DASHBOARD_BATCH_ENABLED: ${GL_DASHBOARD_BATCH_ENABLED:-false}
  PROFILE_PLAYBACK_RUN_ROOT: ${PROFILE_PLAYBACK_RUN_ROOT:-/workdir/wepppy-test-engine-data/playback/runs}
  PROFILE_PLAYBACK_FORK_ROOT: ${PROFILE_PLAYBACK_FORK_ROOT:-/workdir/wepppy-test-engine-data/playback/fork}
  PROFILE_PLAYBACK_ARCHIVE_ROOT: ${PROFILE_PLAYBACK_ARCHIVE_ROOT:-/workdir/wepppy-test-engine-data/playback/archive}
  PROFILE_PLAYBACK_USE_CLONE: ${PROFILE_PLAYBACK_USE_CLONE:-true}
  ENABLE_LOCAL_LOGIN: ${ENABLE_LOCAL_LOGIN:-false}
  WEPPPY_SOURCE_ROOT: ${WEPPPY_SOURCE_ROOT:-/workdir/wepppy}

x-discord-bot-token-secret: &discord-bot-token-secret
  source: discord_bot_token
  target: /opt/vendor/weppcloud2/weppcloud2/discord_bot/.bot_token

x-wepppy-service: &wepppy-service
  <<: *wepppy-image
  init: true
  restart: unless-stopped
  working_dir: /workdir/wepppy
  env_file:
    - ${WEPPPY_ENV_FILE:-defaults.env}
  environment:
    <<: *wepppy-env
  secrets:
    - redis_password
    - *discord-bot-token-secret
  volumes:
    - /wc1:/wc1
    - /wc1/geodata:/geodata
  depends_on:
    redis:
      condition: service_started
    postgres:
      condition: service_healthy
  networks:
    - backend

services:
  fcgiwrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fcgiwrap
      args:
        BASE_IMAGE: ${WEPPCLOUD_IMAGE:-wepppy:latest}
    image: wepppy-fcgiwrap
    restart: unless-stopped
    volumes:
      - /wc1:/wc1
      - /wc1/geodata:/geodata
    expose:
      - "9000"
    networks:
      - backend

  weppcloud:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - postgres_password
      - flask_secret_key
      - flask_security_password_salt
      - wepp_auth_jwt_secrets
      - agent_jwt_secret
      - cap_secret
      - oauth_github_client_secret
      - oauth_google_client_secret
      - zoho_noreply_email_password
      - opentopography_api_key
      - climate_engine_api_key
    environment:
      <<: *wepppy-env
      CONTROLLERS_JS_EXTRA_OUTPUTS: /srv/weppcloud/static/js/controllers-gl.js
      STATIC_ASSET_SYNC_DIR: /srv/weppcloud/static
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      SECURITY_PASSWORD_SALT_FILE: /run/secrets/flask_security_password_salt
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      WEPP_AUTH_JWT_SECRETS_FILE: /run/secrets/wepp_auth_jwt_secrets
      AGENT_JWT_SECRET_FILE: /run/secrets/agent_jwt_secret
      CAP_SECRET_FILE: /run/secrets/cap_secret
      CAP_BASE_URL: ${CAP_BASE_URL:-/cap}
      CAP_ASSET_BASE_URL: ${CAP_ASSET_BASE_URL:-/cap/assets}
      CAP_SITE_KEY: ${CAP_SITE_KEY}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GITHUB_CLIENT_SECRET_FILE: /run/secrets/oauth_github_client_secret
      OAUTH_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/oauth_google_client_secret
      ZOHO_NOREPLY_EMAIL_PASSWORD_FILE: /run/secrets/zoho_noreply_email_password
      OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
      CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
    volumes:
      - /wc1:/wc1
      - /wc1/geodata:/geodata
      - ../wepppy/weppcloud/static:/srv/weppcloud/static
    command:
      - gunicorn
      - --workers
      - "4"
      - --threads
      - "2"
      - --timeout
      - "1800"
      - --bind
      - 0.0.0.0:8000
      - --log-level
      - info
      - --forwarded-allow-ips
      - "192.168.1.1"
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.weppcloud.app:app
    ports:
      - "${WEPPCLOUD_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  browse:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - wepp_auth_jwt_secrets
      - dtale_internal_token
    environment:
      <<: *wepppy-env
      REDIS_URL: ${BROWSE_REDIS_URL:-redis://redis:6379/0}
      WEPP_AUTH_JWT_SECRETS_FILE: /run/secrets/wepp_auth_jwt_secrets
      DTALE_INTERNAL_TOKEN_FILE: /run/secrets/dtale_internal_token
    command:
      - gunicorn
      - --workers
      - "3"
      - --bind
      - 0.0.0.0:9009
      - --log-level
      - info
      - -k
      - uvicorn.workers.UvicornWorker
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.microservices.browse:app
    ports:
      - "${BROWSE_PORT:-9009}:9009"

  dtale:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - dtale_internal_token
    environment:
      <<: *wepppy-env
      DTALE_BASE_URL: http://dtale:9010
      DTALE_INTERNAL_TOKEN_FILE: /run/secrets/dtale_internal_token
    command:
      - gunicorn
      - --workers
      - "1"
      - --bind
      - 0.0.0.0:9010
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.dtale:app
    expose:
      - "9010"

  profile-playback:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - admin_password
    command:
      - uvicorn
      - services.profile_playback.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8070"
    environment:
      <<: *wepppy-env
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      PROFILE_PLAYBACK_BASE_URL: ${PROFILE_PLAYBACK_BASE_URL:-http://weppcloud:8000/weppcloud}
      PROFILE_PLAYBACK_ROOT: ${PROFILE_PLAYBACK_ROOT:-/workdir/wepppy-test-engine-data/profiles}
    volumes:
      - /wc1:/wc1
      - /wc1/geodata:/geodata
      - ${PROFILE_PLAYBACK_DATA_DIR:-/workdir/wepppy-test-engine-data}:/workdir/wepppy-test-engine-data
    expose:
      - "8070"
    depends_on:
      weppcloud:
        condition: service_healthy

  elevationquery:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "2"
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8002
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.microservices.elevationquery:app
    ports:
      - "${ELEVATIONQUERY_PORT:-8002}:8002"

  metquery:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "2"
      - --bind
      - 0.0.0.0:8004
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.metquery:app
    ports:
      - "${METQUERY_PORT:-8004}:8004"

  wmesque:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "4"
      - --bind
      - 0.0.0.0:8003
      - --log-level
      - info
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.wmesque:app
    ports:
      - "${WMESQUE_PORT:-8003}:8003"

  wmesque2:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - gunicorn
      - --workers
      - "4"
      - --bind
      - 0.0.0.0:8030
      - --log-level
      - info
      - -k
      - uvicorn.workers.UvicornWorker
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "200"
      - wepppy.webservices.wmesque2:app
    ports:
      - "${WMESQUE2_PORT:-8030}:8030"

  query-engine:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - wepp_mcp_jwt_secret
    environment:
      <<: *wepppy-env
      EXTERNAL_HOST: ${EXTERNAL_HOST}
      EXTERNAL_HOST_DESCRIPTION: ${EXTERNAL_HOST_DESCRIPTION}
      WEPP_MCP_JWT_SECRET_FILE: /run/secrets/wepp_mcp_jwt_secret
    command:
      - uvicorn
      - wepppy.query_engine.app.server:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8041"
    expose:
      - "8041"

  rq-engine:
    <<: *wepppy-service
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - postgres_password
      - flask_secret_key
      - flask_security_password_salt
      - wepp_auth_jwt_secrets
      - cap_secret
    environment:
      <<: *wepppy-env
      SECRET_KEY_FILE: /run/secrets/flask_secret_key
      SECURITY_PASSWORD_SALT_FILE: /run/secrets/flask_security_password_salt
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      WEPP_AUTH_JWT_SECRETS_FILE: /run/secrets/wepp_auth_jwt_secrets
      CAP_SECRET_FILE: /run/secrets/cap_secret
      CAP_BASE_URL: ${CAP_BASE_URL:-/cap}
      CAP_SITE_KEY: ${CAP_SITE_KEY}
    command:
      - uvicorn
      - wepppy.microservices.rq_engine:app
      - --workers
      - "4"
      - --host
      - 0.0.0.0
      - --port
      - "8042"
    expose:
      - "8042"

  weppcloudr:
    image: ${WEPPCLOUDR_IMAGE:-weppcloudr:latest}
    build:
      context: ..
      dockerfile: weppcloudR/Dockerfile
    restart: unless-stopped
    container_name: weppcloudr
    environment:
      PORT: ${WEPPCLOUDR_PORT:-8050}
      TEMPLATE_ROOT: /srv/weppcloudr/templates/scripts/users/chinmay
      DEVAL_TEMPLATE: /srv/weppcloudr/templates/scripts/users/chinmay/new_report.Rmd
    volumes:
      - /wc1/geodata:/geodata
      - /wc1:/wc1
      - weppcloudr-renv-cache:/opt/weppcloudr/renv/cache
    ports:
      - "${WEPPCLOUDR_PORT:-8050}:${WEPPCLOUDR_PORT:-8050}"
    networks:
      - backend

  webpush:
    <<: *wepppy-service
    command:
      - bash
      - -lc
      - |
        echo "webpush service placeholder – update command once implementation is available.";
        tail -f /dev/null
    profiles: ["webpush"]

  rq-worker:
    <<: *wepppy-service
    cpuset: "0-39"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - opentopography_api_key
      - climate_engine_api_key
    environment:
      <<: *wepppy-env
      LOGLEVEL: INFO
      RQ_LOGGING_LEVEL: INFO
      # Prefer explicit RQ_REDIS_URL when running workers on external hosts
      REDIS_URL: ${RQ_REDIS_URL:-redis://redis:6379/9}
      WEPPCLOUDR_CONTAINER: ${WEPPCLOUDR_CONTAINER:-weppcloudr}
      OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
      CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
    volumes:
      - /wc1:/wc1
      - /wc1/geodata:/geodata
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        redis_url="$$(python -c 'from wepppy.config.redis_settings import redis_url, RedisDB; print(redis_url(RedisDB.RQ))')"
        exec /opt/venv/bin/rq worker-pool -n "6" -u "$$redis_url" --logging-level INFO --worker-class wepppy.rq.WepppyRqWorker default

  rq-worker-batch:
    <<: *wepppy-service
    cpuset: "0-39"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    secrets:
      - redis_password
      - *discord-bot-token-secret
      - opentopography_api_key
      - climate_engine_api_key
    environment:
      <<: *wepppy-env
      LOGLEVEL: INFO
      RQ_LOGGING_LEVEL: INFO
      WEPPPY_NCPU: "6"
      PERIDOT_CPU: "12"
      # Prefer explicit RQ_REDIS_URL when running workers on external hosts
      REDIS_URL: ${RQ_REDIS_URL:-redis://redis:6379/9}
      WEPPCLOUDR_CONTAINER: ${WEPPCLOUDR_CONTAINER:-weppcloudr}
      OPENTOPOGRAPHY_API_KEY_FILE: /run/secrets/opentopography_api_key
      CLIMATE_ENGINE_API_KEY_FILE: /run/secrets/climate_engine_api_key
    volumes:
      - /wc1:/wc1
      - /wc1/geodata:/geodata
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        redis_url="$$(python -c 'from wepppy.config.redis_settings import redis_url, RedisDB; print(redis_url(RedisDB.RQ))')"
        exec /opt/venv/bin/rq worker-pool -n "4" -u "$$redis_url" --logging-level INFO --worker-class wepppy.rq.WepppyRqWorker batch

  status:
    image: ${WEPPCLOUD_STATUS_IMAGE:-wepppy-status:latest}
    build:
      context: ..
      dockerfile: services/status2/Dockerfile
    restart: unless-stopped
    # Compose secrets are bind-mounted; run as the secret-file owner so 0600 files are readable.
    user: "${UID:-1000}:${GID:-1000}"
    secrets:
      - redis_password
    env_file:
      - ${WEPPPY_ENV_FILE:-defaults.env}
    environment:
      STATUS_REDIS_URL: ${STATUS_REDIS_URL:-redis://redis:6379/2}
      STATUS_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      STATUS_LISTEN_ADDR: 0.0.0.0:9002
      STATUS_LOG_LEVEL: info
      STATUS_METRICS_ENABLED: "true"
    ports:
      - "${STATUS_PORT:-9002}:9002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  preflight:
    image: ${WEPPCLOUD_PREFLIGHT_IMAGE:-wepppy-preflight:latest}
    build:
      context: ..
      dockerfile: services/preflight2/Dockerfile
    restart: unless-stopped
    # Compose secrets are bind-mounted; run as the secret-file owner so 0600 files are readable.
    user: "${UID:-1000}:${GID:-1000}"
    secrets:
      - redis_password
    env_file:
      - ${WEPPPY_ENV_FILE:-defaults.env}
    environment:
      PREFLIGHT_REDIS_URL: ${PREFLIGHT_REDIS_URL:-redis://redis:6379/0}
      PREFLIGHT_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      PREFLIGHT_LISTEN_ADDR: 0.0.0.0:9001
      PREFLIGHT_LOG_LEVEL: info
      PREFLIGHT_METRICS_ENABLED: "true"
    ports:
      - "${PREFLIGHT_PORT:-9001}:9001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  cap:
    image: ${CAP_IMAGE:-wepppy-cap:latest}
    build:
      context: ..
      dockerfile: services/cap/Dockerfile
      args:
        CAP_REPO: ${CAP_REPO:-https://github.com/tiagozip/cap}
        CAP_REF: ${CAP_REF:-main}
    restart: unless-stopped
    secrets:
      - cap_secret
    env_file:
      - ${WEPPPY_ENV_FILE:-defaults.env}
    environment:
      CAP_SITE_KEY: ${CAP_SITE_KEY}
      CAP_SECRET_FILE: /run/secrets/cap_secret
      CAP_CORS_ORIGIN: ${CAP_CORS_ORIGIN:-*}
      CAP_ASSET_ROOT: /opt/cap
      CAP_DATA_DIR: /var/lib/cap
    volumes:
      - cap-data:/var/lib/cap
    expose:
      - "3000"
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_PORT:-8080}:8080"
    volumes:
      - ${CADDY_FILE:-./caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - ../wepppy/weppcloud/static:/srv/weppcloud/static:ro
    depends_on:
      weppcloud:
        condition: service_started
      fcgiwrap:
        condition: service_started
      status:
        condition: service_started
      preflight:
        condition: service_started
      cap:
        condition: service_started
      browse:
        condition: service_started
      dtale:
        condition: service_started
      profile-playback:
        condition: service_started
      weppcloudr:
        condition: service_started
    networks:
      - backend

  f-esri:
    image: ${F_ESRI_IMAGE:-wepppy-f-esri:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.f-esri
    restart: unless-stopped
    init: true
    command: ["tail", "-f", "/dev/null"]
    networks:
      - backend

  redis:
    image: redis:latest
    restart: unless-stopped
    secrets:
      - redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-yes}
      REDIS_APPENDFSYNC: ${REDIS_APPENDFSYNC:-everysec}
      REDIS_SAVE_SCHEDULE: ${REDIS_SAVE_SCHEDULE:-900 1 300 10 60 10000}
      REDIS_AOF_USE_RDB_PREAMBLE: ${REDIS_AOF_USE_RDB_PREAMBLE:-yes}
    entrypoint: ["/usr/local/bin/redis-entrypoint.sh"]
    volumes:
      - redis-data:/data
      - ./redis-entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" -h 127.0.0.1 -p 6379 ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    secrets:
      - postgres_password
    environment:
      POSTGRES_DB: wepppy
      POSTGRES_USER: wepppy
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    networks:
      - backend

  postgres-backup:
    image: postgres:16
    restart: unless-stopped
    secrets:
      - postgres_password
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: wepppy
      PGDATABASE: wepppy
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_INTERVAL_SECONDS: 86400
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h $${PGHOST} -U $${PGUSER} -d $${PGDATABASE}"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        mkdir -p "$${BACKUP_DIR:-/backups}"

        if [ ! -f /run/secrets/postgres_password ]; then
          echo "[postgres-backup] Missing /run/secrets/postgres_password" >&2
          exit 1
        fi

        password="$$(cat /run/secrets/postgres_password)"
        if [ -z "$$password" ]; then
          echo "[postgres-backup] /run/secrets/postgres_password is empty" >&2
          exit 1
        fi

        pgpass_file="/tmp/.pgpass"
        umask 077
        printf "%s:%s:%s:%s:%s\\n" "$${PGHOST}" "$${PGPORT:-5432}" "$${PGDATABASE}" "$${PGUSER}" "$$password" > "$$pgpass_file"
        export PGPASSFILE="$$pgpass_file"

        # Run initial backup on startup
        run_backup() {
          ts=$$(date +"%Y%m%d-%H%M%S")
          target="$${BACKUP_DIR:-/backups}/weppcloud-$${ts}.dump"
          tmp_target="$${target}.tmp"

          echo "[ $$(date --iso-8601=seconds) ] Starting backup to $$target"

          # Dump to temp file first, then atomic rename
          if pg_dump -h "$${PGHOST}" -U "$${PGUSER}" -d "$${PGDATABASE}" -Fc -f "$$tmp_target"; then
            mv "$$tmp_target" "$$target"

            # Verify backup header
            if head -c 5 "$$target" | grep -q "PGDMP"; then
              size=$$(du -h "$$target" | cut -f1)
              echo "[ $$(date --iso-8601=seconds) ] Backup complete: $$target ($$size)"
            else
              echo "[ $$(date --iso-8601=seconds) ] ERROR: Backup verification failed - invalid header"
              rm -f "$$target"
              return 1
            fi
          else
            echo "[ $$(date --iso-8601=seconds) ] ERROR: pg_dump failed"
            rm -f "$$tmp_target"
            return 1
          fi

          # Purge old backups
          echo "[ $$(date --iso-8601=seconds) ] Purging backups older than $${BACKUP_KEEP_DAYS:-7} days"
          find "$${BACKUP_DIR:-/backups}" -name "weppcloud-*.dump" -type f -mtime +$${BACKUP_KEEP_DAYS:-7} -delete

          # Also purge legacy named backups
          find "$${BACKUP_DIR:-/backups}" -name "wepppy-*.dump" -type f -mtime +$${BACKUP_KEEP_DAYS:-7} -delete

          # List current backups
          echo "[ $$(date --iso-8601=seconds) ] Current backups:"
          ls -lh "$${BACKUP_DIR:-/backups}"/*.dump 2>/dev/null || echo "  (none)"
        }

        # Initial backup
        run_backup || echo "Initial backup failed, will retry on schedule"

        # Scheduled backups
        while true; do
          sleep $${BACKUP_INTERVAL_SECONDS:-86400}
          run_backup || echo "Scheduled backup failed"
        done

  scheduler:
    <<: *wepppy-service
    container_name: wepppy-scheduler
    depends_on:
      redis:
        condition: service_started
    environment:
      <<: *wepppy-env
      SCHEDULE_CONFIG: /workdir/wepppy/docker/scheduled-tasks.yml
      SCHEDULE_SLEEP_SECONDS: "30"
      SCHEDULE_LOG_LEVEL: INFO
    command:
      - python
      - -m
      - wepppy.tools.scheduler

networks:
  backend:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  weppcloudr-renv-cache:
  postgres-backups:
  cap-data:

